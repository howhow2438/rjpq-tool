<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Artale 羅茱平台助手</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #162235;
      --line: rgba(255,255,255,.08);
      --text: #eef4ff;
      --muted: #9fb0c7;
      --primary: #4f8cff;
      --primary-2: #2f6ee8;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --btn: #1c2a40;
      --shadow: 0 14px 30px rgba(0,0,0,.24);
      --p1: #4f8cff;
      --p1-2: #2f6ee8;
      --p1-rgb: 79,140,255;
      --p2: #22c55e;
      --p2-2: #16a34a;
      --p2-rgb: 34,197,94;
      --p3: #f59e0b;
      --p3-2: #ea8500;
      --p3-rgb: 245,158,11;
      --p4: #ef5da8;
      --p4-2: #db2777;
      --p4-rgb: 239,93,168;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #0a1020 0%, #0f172a 100%);
      color: var(--text);
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }

    body { padding: 10px; }
    .app {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }

    .title {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 900;
    }

    .sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .mini-chips, .inline-chips, .presence-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-chips { justify-content: flex-end; }

    .chip, .status-pill, .presence-chip {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid rgba(79, 140, 255, .2);
      background: rgba(79, 140, 255, .12);
      color: #dbeafe;
      white-space: nowrap;
    }

    .presence-chip.host {
      background: rgba(245, 158, 11, .14);
      border-color: rgba(245, 158, 11, .28);
      color: #fde68a;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 900;
    }

    .compact-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stack { display: grid; gap: 8px; }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      background: #0d1525;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 15px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: rgba(79, 140, 255, .55);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, .16);
    }

    input[readonly] {
      opacity: .85;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
    }

    button:active { transform: scale(.98); }
    button:disabled { opacity: .48; cursor: not-allowed; }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .btn {
      min-height: 42px;
      padding: 10px 12px;
      color: white;
      background: linear-gradient(180deg, var(--primary), var(--primary-2));
    }

    .btn.secondary {
      background: var(--btn);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.warn {
      background: linear-gradient(180deg, #f59e0b, #ea8500);
    }

    .btn.danger {
      background: linear-gradient(180deg, #ef4444, #dc2626);
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .player-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
    }

    .player-head {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .player-title {
      font-size: 12px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .player-role {
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--muted);
    }

    .player-role.me {
      background: rgba(79,140,255,.18);
      color: #dbeafe;
    }

    .player-box.colorized,
    .player-head.colorized,
    .pick-cell.has-value {
      border-color: rgba(var(--slot-rgb, 139,92,246), .34);
      background: rgba(var(--slot-rgb, 139,92,246), .12);
    }

    .player-box.colorized input {
      border-color: rgba(var(--slot-rgb, 139,92,246), .28);
    }

    .color-picker-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      border: 2px solid transparent;
      background: var(--swatch, #8b5cf6);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.22);
      cursor: pointer;
    }

    .color-dot.selected {
      border-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(255,255,255,.15);
    }

    .color-dot:disabled {
      opacity: .38;
      cursor: not-allowed;
    }

    .help-line {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.45;
    }

    .board-card { padding: 10px; }

    .board-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .board-scroll {
      display: grid;
      gap: 8px;
    }

    .matrix {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .shared-floor-card {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
    }

    .floor-cell {
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    .floor-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(79, 140, 255, .14);
      border: 1px solid rgba(79, 140, 255, .22);
      font-size: 12px;
      font-weight: 900;
      color: #e8f0ff;
    }

    .floor-count {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }

    .shared-pick-cell {
      width: 100%;
      min-width: 0;
      padding: 5px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }

    .shared-pick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 6px;
    }

    .shared-pick-btn {
      position: relative;
      min-height: 46px;
      padding: 6px 4px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,.08);
      background: #0d1525;
      color: var(--muted);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 2px;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overflow: hidden;
    }

    .shared-pick-btn .num {
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    .shared-pick-btn .owner {
      font-size: 10px;
      line-height: 1.1;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: 1.1em;
    }

    .shared-pick-btn.claimed {
      color: white;
      border-color: rgba(255,255,255,.16);
      background: linear-gradient(180deg, var(--slot-color, #8b5cf6), var(--slot-color-2, #7c3aed));
      box-shadow: 0 6px 14px rgba(var(--slot-rgb, 139,92,246), .25);
    }

    .shared-pick-btn.mine {
      box-shadow: 0 0 0 2px rgba(255,255,255,.2), 0 6px 14px rgba(var(--slot-rgb, 139,92,246), .25);
    }

    .shared-pick-btn.locked {
      opacity: .9;
    }

    .shared-pick-btn.empty:hover:not(:disabled) {
      background: #13203a;
      color: #dbeafe;
      border-color: rgba(79,140,255,.28);
    }

    .shared-pick-btn.x-marked::before {
      content: "";
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: rgba(239, 68, 68, .96);
      box-shadow: 0 2px 6px rgba(0,0,0,.28);
      z-index: 2;
    }

    .shared-pick-btn.x-marked::after {
      content: "✕";
      position: absolute;
      top: 3px;
      right: 8px;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      color: #fff;
      z-index: 3;
      text-shadow: 0 1px 2px rgba(0,0,0,.35);
      pointer-events: none;
    }

    .shared-pick-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .kick-btn {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 9px;
      background: rgba(239,68,68,.14);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,.22);
      font-size: 12px;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(12px);
      background: rgba(5,10,20,.95);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      z-index: 999;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 720px) {
      body { padding: 8px; }
      .title { font-size: 20px; }
      .header { align-items: flex-start; flex-direction: column; }
      .mini-chips { justify-content: flex-start; }
      .row-3, .row-2, .btn-grid, .quick-actions {
        grid-template-columns: 1fr 1fr;
      }
      .players-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 520px) {
      .row-3, .row-2, .btn-grid, .quick-actions {
        grid-template-columns: 1fr;
      }
      .players-grid {
        grid-template-columns: 1fr 1fr;
      }
      .shared-floor-card {
        grid-template-columns: 54px 1fr;
        gap: 6px;
        padding: 7px;
      }
      .shared-pick-grid {
        gap: 4px;
      }
      .shared-pick-btn {
        min-height: 42px;
        padding: 5px 3px;
      }
      .shared-pick-btn .num {
        font-size: 14px;
      }
      .shared-pick-btn .owner {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card header">
      <div>
        <h1 class="title">Artale 羅茱平台助手</h1>
        <div class="sub">建立或加入房間後即可開始記錄平台。</div>
      </div>
    </section>

    <section class="card">
      <div class="compact-head">
        <h2 class="section-title" style="margin:0;">房間與玩家</h2>
        <div class="hint">先設定暱稱，再建立或加入房間</div>
      </div>
      <div class="stack">
        <div class="row-3">
          <div>
            <label class="label" for="nicknameInput">我的暱稱</label>
            <input id="nicknameInput" type="text" maxlength="20" placeholder="例如：隊長 / 主教" />
          </div>
          <div>
            <label class="label" for="roomInput">房號</label>
            <input id="roomInput" type="text" maxlength="40" placeholder="例如：RJ-8421" />
          </div>
          <div style="display:flex;align-items:flex-end;">
            <button class="btn secondary" id="copyRoomBtn" style="width:100%;">複製房號</button>
          </div>
        </div>

        <div class="btn-grid">
          <button class="btn" id="createRoomBtn">建立新房</button>
          <button class="btn secondary" id="joinRoomBtn">加入房間</button>
          <button class="btn secondary" id="copyLinkBtn">複製邀請連結</button>
          <button class="btn danger" id="disconnectBtn">離開房間</button>
        </div>

        <div class="inline-chips">
          <span class="status-pill">房間：<strong id="statusRoom">未加入</strong></span>
          <span class="status-pill">角色：<strong id="statusRole">未加入</strong></span>
          <span class="status-pill">連線：<strong id="statusSync">尚未連線</strong></span>
          <span class="status-pill">人數：<strong id="statusPeers">0</strong></span>
          <span class="status-pill">更新：<strong id="lastUpdated">--</strong></span>
        </div>

        <div class="presence-list" id="presenceList">
          <span class="presence-chip">尚未加入房間</span>
        </div>

        <div class="help-line">
          可自行修改名稱與顏色；同房成員會看到最新設定。
        </div>
      </div>
    </section>

    <section class="card">
      <div class="compact-head">
        <h2 class="section-title" style="margin:0;">玩家欄位</h2>
        <div class="hint">可改名稱與顏色｜平台選位改為每層共用</div>
      </div>
      <div class="players-grid" id="playerInputs"></div>
    </section>

    <section class="card board-card">
      <div class="board-toolbar">
        <h2 class="section-title" style="margin:0;">平台記錄</h2>
        <div class="hint">每層共用一組按鈕｜同一數字不可重複被不同人選</div>
      </div>
      <div class="board-scroll">
        <div class="matrix" id="boardBody"></div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">單人複製</h2>
      <div class="quick-actions" id="copyPlayerActions"></div>
      <div class="quick-actions" style="margin-top:8px;">
        <button class="btn warn" id="clearBoardBtn">清空本房答案</button>
        <button class="btn secondary" id="reconnectBtn">重新整理房間狀態</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SLOT_KEYS = ["p1", "p2", "p3", "p4"];
    const FLOORS = Array.from({ length: 10 }, (_, i) => i + 1);
    const DISPLAY_FLOORS = [...FLOORS].reverse();
    const COLOR_OPTIONS = {
      purple: { label: "紫色", color: "#8b5cf6", color2: "#7c3aed", rgb: "139,92,246" },
      green:  { label: "綠色", color: "#22c55e", color2: "#16a34a", rgb: "34,197,94" },
      yellow: { label: "黃色", color: "#facc15", color2: "#eab308", rgb: "250,204,21" },
      red:    { label: "紅色", color: "#ef4444", color2: "#dc2626", rgb: "239,68,68" }
    };

    const DEFAULT_SLOT_COLORS = {
      p1: "purple",
      p2: "green",
      p3: "yellow",
      p4: "red"
    };

    const SLOT_META = {
      p1: { label: "玩家1", className: "player-p1" },
      p2: { label: "玩家2", className: "player-p2" },
      p3: { label: "玩家3", className: "player-p3" },
      p4: { label: "玩家4", className: "player-p4" }
    };

    const $ = (id) => document.getElementById(id);

    const dom = {
      nicknameInput: $("nicknameInput"),
      roomInput: $("roomInput"),
      createRoomBtn: $("createRoomBtn"),
      joinRoomBtn: $("joinRoomBtn"),
      copyLinkBtn: $("copyLinkBtn"),
      copyRoomBtn: $("copyRoomBtn"),
      disconnectBtn: $("disconnectBtn"),
      reconnectBtn: $("reconnectBtn"),
      clearBoardBtn: $("clearBoardBtn"),
      statusRoom: $("statusRoom"),
      statusRole: $("statusRole"),
      statusSync: $("statusSync"),
      statusPeers: $("statusPeers"),
      lastUpdated: $("lastUpdated"),
      presenceList: $("presenceList"),
      playerInputs: $("playerInputs"),
      boardBody: $("boardBody"),
      copyPlayerActions: $("copyPlayerActions"),
      toast: $("toast")
    };

    let peer = null;
    let isHost = false;
    let roomId = "";
    let myPeerId = "";
    let mySlot = "";
    let hostConn = null;
    let hostPeerId = "";
    let hostReady = false;
    const guestConnections = new Map();

    let state = createEmptyState();
    let localXMarks = {};

    function createEmptyState() {
      const participants = {};
      SLOT_KEYS.forEach((slot) => participants[slot] = null);
      return {
        participants,
        answers: {},
        updatedAt: 0
      };
    }

    function nowTs() {
      return Date.now();
    }

    function sanitizeRoom(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, "")
        .replace(/[^A-Za-z0-9\-_]/g, "")
        .slice(0, 80);
    }

    function sanitizeNick(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, " ")
        .slice(0, 20);
    }

    function generateRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let result = "RJ-";
      for (let i = 0; i < 6; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
      }
      return result;
    }

    function showToast(message) {
      dom.toast.textContent = message;
      dom.toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => dom.toast.classList.remove("show"), 1800);
    }

    async function copyText(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (_) {}
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        return true;
      } catch (_) {
        return false;
      }
    }

    function getInviteLink() {
      if (!roomId) return "";
      const url = new URL(window.location.href);
      const params = new URLSearchParams();
      params.set("room", roomId);
      url.hash = params.toString();
      return url.toString();
    }

    function saveLocalPrefs() {
      localStorage.setItem("rjpq_peerjs_nick", dom.nicknameInput.value.trim());
    }

    function restoreLocalPrefs() {
      const nick = localStorage.getItem("rjpq_peerjs_nick") || "";
      if (nick) dom.nicknameInput.value = nick;
    }

    function getLocalXStorageKey() {
      const keyRoom = sanitizeRoom(roomId || dom.roomInput.value || "");
      return keyRoom ? `rjpq_xmarks_${keyRoom}` : "";
    }

    function loadLocalXMarks() {
      const storageKey = getLocalXStorageKey();
      if (!storageKey) {
        localXMarks = {};
        return;
      }
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || "{}");
        localXMarks = parsed && typeof parsed === "object" ? parsed : {};
      } catch (_) {
        localXMarks = {};
      }
    }

    function saveLocalXMarks() {
      const storageKey = getLocalXStorageKey();
      if (!storageKey) return;
      try {
        localStorage.setItem(storageKey, JSON.stringify(localXMarks));
      } catch (_) {}
    }

    function hasLocalXMark(floor, value) {
      return !!localXMarks[`${floor}:${value}`];
    }

    function toggleLocalXMark(floor, value) {
      const key = `${floor}:${value}`;
      if (localXMarks[key]) {
        delete localXMarks[key];
      } else {
        localXMarks[key] = 1;
      }
      saveLocalXMarks();
      renderBoard();
    }

    function emptyAnswersForSlot(slot) {
      if (!slot) return;
      for (const floor of FLOORS) {
        delete state.answers[`${floor}:${slot}`];
      }
    }

    function getConnectedParticipants() {
      return SLOT_KEYS.map((slot) => state.participants[slot]).filter(Boolean);
    }

    function uniqueOrder(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function getUsedColorKeys(exceptSlot = "") {
      const used = new Set();
      SLOT_KEYS.forEach((slot) => {
        if (slot === exceptSlot) return;
        const colorKey = state.participants[slot]?.colorKey;
        if (COLOR_OPTIONS[colorKey]) used.add(colorKey);
      });
      return used;
    }

    function getFirstAvailableColor(exceptSlot = "", preferredOrder = []) {
      const used = getUsedColorKeys(exceptSlot);
      const order = uniqueOrder([...preferredOrder, ...Object.keys(COLOR_OPTIONS)]);
      return order.find((key) => COLOR_OPTIONS[key] && !used.has(key)) || null;
    }

    function normalizeUniqueColors(preferredSlot = "") {
      const taken = new Set();

      if (preferredSlot && state.participants[preferredSlot]) {
        let keepColor = state.participants[preferredSlot].colorKey;
        if (!COLOR_OPTIONS[keepColor] || taken.has(keepColor)) {
          keepColor = getFirstAvailableColor(preferredSlot, [DEFAULT_SLOT_COLORS[preferredSlot]]);
          state.participants[preferredSlot].colorKey = keepColor || DEFAULT_SLOT_COLORS[preferredSlot] || "purple";
        }
        taken.add(state.participants[preferredSlot].colorKey);
      }

      SLOT_KEYS.forEach((slot) => {
        if (slot === preferredSlot) return;
        const participant = state.participants[slot];
        if (!participant) return;

        let nextColor = participant.colorKey;
        if (!COLOR_OPTIONS[nextColor] || taken.has(nextColor)) {
          const preferred = uniqueOrder([DEFAULT_SLOT_COLORS[slot], nextColor]);
          nextColor = uniqueOrder([...preferred, ...Object.keys(COLOR_OPTIONS)]).find((key) => COLOR_OPTIONS[key] && !taken.has(key)) || DEFAULT_SLOT_COLORS[slot] || "purple";
          participant.colorKey = nextColor;
        }
        taken.add(nextColor);
      });
    }

    function getColorKey(slot) {
      return state.participants[slot]?.colorKey || DEFAULT_SLOT_COLORS[slot] || "purple";
    }

    function getTheme(slot) {
      return COLOR_OPTIONS[getColorKey(slot)] || COLOR_OPTIONS.purple;
    }

    function themeStyle(slot) {
      const theme = getTheme(slot);
      return `--slot-color:${theme.color};--slot-color-2:${theme.color2};--slot-rgb:${theme.rgb};`;
    }

    function getSlotName(slot) {
      return state.participants[slot]?.name || SLOT_META[slot].label;
    }

    function getAnswer(floor, slot) {
      return state.answers[`${floor}:${slot}`] || "";
    }

    function getSelectedSlotByValue(floor, value, excludeSlot = "") {
      const target = String(value || "");
      if (!target) return "";
      return SLOT_KEYS.find((slot) => slot !== excludeSlot && getAnswer(floor, slot) === target) || "";
    }

    function getFloorSelections(floor) {
      const result = {};
      SLOT_KEYS.forEach((slot) => {
        const value = getAnswer(floor, slot);
        if (value) result[value] = slot;
      });
      return result;
    }

    function setAnswerLocal(floor, slot, value) {
      const key = `${floor}:${slot}`;
      if (!value) delete state.answers[key];
      else state.answers[key] = String(value);
      state.updatedAt = nowTs();
    }

    function buildPlayerReport(slot) {
      const name = getSlotName(slot);
      const digits = FLOORS.map((floor) => String(getAnswer(floor, slot) || 0));
      return `${name}: ${digits.slice(0, 5).join("")}/${digits.slice(5).join("")}`;
    }

    function canEditSlot(slot) {
      if (!roomId) return false;
      if (isHost) return true;
      return mySlot === slot;
    }

    function setStatusText(el, text, kind) {
      el.textContent = text;
      el.className = "";
      if (kind) el.classList.add(kind);
    }

    function renderStatus() {
      dom.statusRoom.textContent = roomId || "未加入";
      dom.statusRole.textContent = !roomId ? "未加入" : (isHost ? "房主" : (mySlot ? `成員 (${SLOT_META[mySlot].label})` : "成員"));
      if (!roomId) {
        setStatusText(dom.statusSync, "尚未連線", "");
      } else if (isHost) {
        setStatusText(dom.statusSync, hostReady ? "房主待命中" : "建立中", hostReady ? "online" : "warn-text");
      } else if (hostConn && hostConn.open) {
        setStatusText(dom.statusSync, "已連上房主", "online");
      } else {
        setStatusText(dom.statusSync, "等待房主", "warn-text");
      }

      dom.statusPeers.textContent = String(getConnectedParticipants().length);
      if (state.updatedAt) {
        dom.lastUpdated.textContent = new Date(state.updatedAt).toLocaleTimeString("zh-TW", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      } else {
        dom.lastUpdated.textContent = "--";
      }

      dom.createRoomBtn.disabled = !!roomId;
      dom.joinRoomBtn.disabled = !!roomId;
      dom.copyLinkBtn.disabled = !roomId;
      dom.copyRoomBtn.disabled = !roomId;
      dom.disconnectBtn.disabled = !roomId;
      dom.clearBoardBtn.disabled = !roomId;
      dom.reconnectBtn.disabled = !roomId;
      dom.roomInput.readOnly = !!roomId;
    }

    function renderPresence() {
      const list = getConnectedParticipants();
      if (!list.length) {
        dom.presenceList.innerHTML = '<span class="presence-chip">尚未加入房間</span>';
        return;
      }
      dom.presenceList.innerHTML = "";
      list.forEach((participant) => {
        const slot = participant.slot;
        const wrapper = document.createElement("span");
        wrapper.className = `presence-chip${participant.isHost ? " host" : ""}`;
        const theme = getTheme(slot);
        wrapper.style.borderColor = `rgba(${theme.rgb}, .34)`;
        wrapper.style.background = `rgba(${theme.rgb}, .14)`;
        wrapper.style.color = theme.color;
        wrapper.textContent = `${SLOT_META[slot].label}｜${participant.name}${slot === mySlot ? "（我）" : ""}${participant.isHost ? "｜房主" : ""}`;
        if (isHost && !participant.isHost) {
          const btn = document.createElement("button");
          btn.className = "kick-btn";
          btn.textContent = "移除";
          btn.dataset.kickSlot = slot;
          wrapper.appendChild(document.createTextNode(" "));
          wrapper.appendChild(btn);
        }
        dom.presenceList.appendChild(wrapper);
      });
    }

    function renderPlayers() {
      dom.playerInputs.innerHTML = "";
      SLOT_KEYS.forEach((slot) => {
        const meta = SLOT_META[slot];
        const participant = state.participants[slot];
        const box = document.createElement("div");
        box.className = `player-box colorized ${meta.className}`;
        box.style.cssText = themeStyle(slot);

        const isMine = mySlot === slot;
        const canEdit = canEditSlot(slot) && !!participant;
        const headRole = participant
          ? (participant.isHost ? "房主" : (isMine ? "我的欄位" : "隊友"))
          : "空位";

        const usedColorsByOthers = getUsedColorKeys(slot);
        const colorButtons = Object.entries(COLOR_OPTIONS).map(([key, option]) => {
          const lockedByOther = usedColorsByOthers.has(key) && getColorKey(slot) !== key;
          return `
          <button
            type="button"
            class="color-dot ${getColorKey(slot) === key ? "selected" : ""}"
            data-slot="${slot}"
            data-color="${key}"
            style="--swatch:${option.color}"
            title="${lockedByOther ? option.label + '（已被使用）' : option.label}"
            ${canEdit && !lockedByOther ? "" : "disabled"}
          ></button>
        `;
        }).join("");

        box.innerHTML = `
          <div class="player-head colorized ${meta.className}" style="${themeStyle(slot)}">
            <div class="player-title">${meta.label}</div>
            <div class="player-role ${isMine ? "me" : ""}">${headRole}</div>
          </div>
          <label class="label" for="name-${slot}">顯示名稱</label>
          <input id="name-${slot}" type="text" maxlength="20" value="${participant ? escapeHtml(participant.name) : ""}" placeholder="${meta.label}" ${canEdit ? "" : "readonly"} />
          <div class="help-line">顏色：${colorName(getColorKey(slot))}${participant ? `｜ID ${participant.peerId.slice(0, 8)}` : ""}</div>
          <div class="color-picker-row">${colorButtons}</div>
        `;
        dom.playerInputs.appendChild(box);

        const input = box.querySelector(`#name-${slot}`);
        input.addEventListener("change", () => {
          const next = sanitizeNick(input.value) || meta.label;
          input.value = next;
          renameSlot(slot, next);
        });

        box.querySelectorAll(".color-dot").forEach((btn) => {
          btn.addEventListener("click", () => {
            changeSlotColor(slot, btn.dataset.color);
          });
        });
      });
    }

    function renderCopyActions() {
      dom.copyPlayerActions.innerHTML = "";
      SLOT_KEYS.forEach((slot) => {
        const btn = document.createElement("button");
        btn.className = `btn secondary`;
        btn.textContent = `複製 ${getSlotName(slot)}`;
        btn.disabled = !state.participants[slot];
        btn.addEventListener("click", async () => {
          const ok = await copyText(buildPlayerReport(slot));
          showToast(ok ? `已複製 ${getSlotName(slot)}` : "複製失敗");
        });
        dom.copyPlayerActions.appendChild(btn);
      });
    }

    function renderBoard() {
      const rows = DISPLAY_FLOORS.map((floor) => {
        const selections = getFloorSelections(floor);
        const count = Object.keys(selections).length;

        const buttons = [1, 2, 3, 4].map((n) => {
          const value = String(n);
          const ownerSlot = selections[value] || "";
          const ownerName = ownerSlot ? getSlotName(ownerSlot) : "";
          const theme = ownerSlot ? getTheme(ownerSlot) : null;
          const classes = ["shared-pick-btn", ownerSlot ? "claimed" : "empty"];
          if (ownerSlot && ownerSlot === mySlot) classes.push("mine");
          if (ownerSlot && ownerSlot !== mySlot) classes.push("locked");
          if (hasLocalXMark(floor, value)) classes.push("x-marked");
          const style = theme
            ? `style="--slot-color:${theme.color};--slot-color-2:${theme.color2};--slot-rgb:${theme.rgb};"`
            : "";
          const disabled = !roomId || !mySlot ? "disabled" : "";
          return `
            <button
              type="button"
              class="${classes.join(" ")}" ${style}
              data-floor="${floor}"
              data-value="${value}"
              data-owner-slot="${ownerSlot}"
              ${disabled}
            >
              <span class="num">${value}</span>
              <span class="owner">${escapeHtml(ownerName)}</span>
            </button>
          `;
        }).join("");

        return `
          <div class="shared-floor-card">
            <div class="floor-cell">
              <span class="floor-badge">${floor}F</span>
              <span class="floor-count">${count}/4</span>
            </div>
            <div class="shared-pick-cell">
              <div class="shared-pick-grid">${buttons}</div>
            </div>
          </div>
        `;
      }).join("");

      dom.boardBody.innerHTML = rows;

      dom.boardBody.querySelectorAll(".shared-pick-btn[data-floor][data-value]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const floor = Number(btn.dataset.floor);
          const value = String(btn.dataset.value || "");
          const ownerSlot = btn.dataset.ownerSlot || "";

          if (!roomId || !mySlot) {
            showToast("請先建立或加入房間");
            return;
          }

          if (ownerSlot && ownerSlot !== mySlot) {
            showToast(`${getSlotName(ownerSlot)} 已選 ${value}`);
            return;
          }

          const current = getAnswer(floor, mySlot);
          const nextValue = current === value ? "" : value;
          updateAnswer(mySlot, floor, nextValue);
        });

        btn.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          const floor = Number(btn.dataset.floor);
          const value = String(btn.dataset.value || "");
          if (!value) return;
          toggleLocalXMark(floor, value);
        });
      });
    }

    function colorName(colorKey) {
      return COLOR_OPTIONS[colorKey]?.label || "紫色";
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[m]);
    }

    function refreshAll() {
      renderStatus();
      renderPresence();
      renderPlayers();
      renderBoard();
      renderCopyActions();
    }

    function broadcastState() {
      if (!isHost) return;
      state.updatedAt = nowTs();
      for (const { conn } of guestConnections.values()) {
        if (conn.open) {
          conn.send({ type: "STATE_SYNC", state });
        }
      }
      refreshAll();
    }

    function findSlotByPeerId(peerId) {
      return SLOT_KEYS.find((slot) => state.participants[slot]?.peerId === peerId) || "";
    }

    function getFreeSlot() {
      return SLOT_KEYS.find((slot) => !state.participants[slot]) || "";
    }

    let peerScriptPromise = null;
    let peerLifecycleId = 0;

    function ensurePeerJsLoaded() {
      if (window.Peer) return Promise.resolve();
      if (peerScriptPromise) return peerScriptPromise;

      peerScriptPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js";
        script.async = true;
        script.onload = () => resolve();
        script.onerror = () => {
          peerScriptPromise = null;
          reject(new Error("PEERJS_LOAD_FAILED"));
        };
        document.head.appendChild(script);
      });

      return peerScriptPromise;
    }

    async function createPeer(peerId) {
      await ensurePeerJsLoaded();
      return new Peer(peerId || undefined, {
        debug: 1,
        pingInterval: 4000,
        config: {
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" }
          ]
        }
      });
    }

    function destroyPeer() {
      peerLifecycleId += 1;
      if (hostConn) {
        try { hostConn.close(); } catch (_) {}
        hostConn = null;
      }

      for (const { conn } of guestConnections.values()) {
        try { conn.close(); } catch (_) {}
      }
      guestConnections.clear();

      if (peer) {
        try { peer.destroy(); } catch (_) {}
        peer = null;
      }

      isHost = false;
      hostReady = false;
      roomId = "";
      myPeerId = "";
      mySlot = "";
      hostPeerId = "";
      localXMarks = {};
      state = createEmptyState();
      refreshAll();
    }

    function setupCommonPeerEvents(localPeer) {
      localPeer.on("error", (err) => {
        console.error(err);
        if (err.type === "unavailable-id") {
          showToast("房號已被使用，請換一個房號");
          if (isHost && !myPeerId) {
            const keepRoom = dom.roomInput.value;
            destroyPeer();
            dom.roomInput.value = keepRoom;
          }
        } else if (err.type === "peer-unavailable") {
          showToast("找不到房號，請確認房主仍在線");
          if (!isHost && !myPeerId) {
            const keepRoom = dom.roomInput.value;
            destroyPeer();
            dom.roomInput.value = keepRoom;
          }
        } else {
          showToast(`連線錯誤：${err.type || "unknown"}`);
        }
        renderStatus();
      });

      localPeer.on("disconnected", () => {
        setStatusText(dom.statusSync, isHost ? "房主重新掛線中" : "重新連線中", "warn-text");
        try { localPeer.reconnect(); } catch (_) {}
        renderStatus();
      });

      localPeer.on("close", () => {
        renderStatus();
      });
    }

    function setupHostConnection(conn) {
      conn.on("open", () => {
        console.log("guest connected", conn.peer);
      });

      conn.on("data", (msg) => {
        handleHostMessage(conn, msg);
      });

      conn.on("close", () => {
        const slot = guestConnections.get(conn.peer)?.slot || findSlotByPeerId(conn.peer);
        guestConnections.delete(conn.peer);
        if (slot && state.participants[slot]) {
          emptyAnswersForSlot(slot);
          state.participants[slot] = null;
          broadcastState();
          showToast(`${SLOT_META[slot].label} 已離線`);
        } else {
          refreshAll();
        }
      });

      conn.on("error", (err) => {
        console.error(err);
      });
    }

    function handleHostMessage(conn, msg) {
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "JOIN_REQUEST") {
        const freeSlot = getFreeSlot();
        if (!freeSlot) {
          conn.send({ type: "JOIN_REJECT", reason: "房間已滿（上限 4 人）" });
          return;
        }

        const requestedName = sanitizeNick(msg.name) || SLOT_META[freeSlot].label;
        const assignedColor = getFirstAvailableColor("", [DEFAULT_SLOT_COLORS[freeSlot]]) || DEFAULT_SLOT_COLORS[freeSlot];
        state.participants[freeSlot] = {
          slot: freeSlot,
          name: requestedName,
          peerId: conn.peer,
          isHost: false,
          colorKey: assignedColor
        };
        normalizeUniqueColors(freeSlot);
        guestConnections.set(conn.peer, { conn, slot: freeSlot });
        conn.send({
          type: "JOIN_ACCEPT",
          slot: freeSlot,
          roomId,
          hostPeerId: myPeerId
        });
        broadcastState();
        showToast(`${requestedName} 已加入 ${SLOT_META[freeSlot].label}`);
        return;
      }

      const senderSlot = guestConnections.get(conn.peer)?.slot || findSlotByPeerId(conn.peer);
      if (!senderSlot) return;

      if (msg.type === "RENAME_ME") {
        const next = sanitizeNick(msg.name) || SLOT_META[senderSlot].label;
        state.participants[senderSlot].name = next;
        broadcastState();
        return;
      }

      if (msg.type === "SET_COLOR") {
        if (COLOR_OPTIONS[msg.colorKey]) {
          state.participants[senderSlot].colorKey = msg.colorKey;
          normalizeUniqueColors(senderSlot);
          broadcastState();
        }
        return;
      }

      if (msg.type === "SET_ANSWER") {
        const floor = Number(msg.floor);
        const value = String(msg.value || "");
        if (!FLOORS.includes(floor)) return;
        if (value && !["1", "2", "3", "4"].includes(value)) return;
        if (value) {
          const occupiedBy = getSelectedSlotByValue(floor, value, senderSlot);
          if (occupiedBy) {
            conn.send({ type: "ACTION_REJECT", reason: `${getSlotName(occupiedBy)} 已選 ${value}` });
            conn.send({ type: "STATE_SYNC", state });
            return;
          }
        }
        setAnswerLocal(floor, senderSlot, value);
        broadcastState();
        return;
      }

      if (msg.type === "CLEAR_BOARD") {
        for (const slot of SLOT_KEYS) {
          emptyAnswersForSlot(slot);
        }
        broadcastState();
        return;
      }

      if (msg.type === "LEAVE_ROOM") {
        emptyAnswersForSlot(senderSlot);
        state.participants[senderSlot] = null;
        guestConnections.delete(conn.peer);
        try { conn.close(); } catch (_) {}
        broadcastState();
      }
    }

    function setupGuestConnection(conn) {
      hostConn = conn;

      conn.on("open", () => {
        setStatusText(dom.statusSync, "已連上房主", "online");
        conn.send({
          type: "JOIN_REQUEST",
          name: sanitizeNick(dom.nicknameInput.value) || "玩家"
        });
      });

      conn.on("data", (msg) => {
        handleGuestMessage(msg);
      });

      conn.on("close", () => {
        if (roomId) {
          showToast("房主已離線或房間已關閉");
        }
        destroyPeer();
        restoreFromHash();
      });

      conn.on("error", (err) => {
        console.error(err);
        showToast("連線到房主失敗");
      });
    }

    function handleGuestMessage(msg) {
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "JOIN_ACCEPT") {
        mySlot = msg.slot;
        roomId = msg.roomId;
        hostPeerId = msg.hostPeerId;
        loadLocalXMarks();
        window.location.hash = new URLSearchParams({ room: roomId }).toString();
        saveLocalPrefs();
        refreshAll();
        return;
      }

      if (msg.type === "JOIN_REJECT") {
        showToast(msg.reason || "加入失敗");
        destroyPeer();
        restoreFromHash();
        return;
      }

      if (msg.type === "ACTION_REJECT") {
        showToast(msg.reason || "此數字已被其他人選走");
        return;
      }

      if (msg.type === "STATE_SYNC" && msg.state) {
        state = msg.state;
        normalizeUniqueColors();
        const found = findSlotByPeerId(myPeerId);
        if (found) mySlot = found;
        refreshAll();
      }

      if (msg.type === "KICK" && msg.slot === mySlot) {
        showToast("你已被房主移出房間");
        destroyPeer();
        restoreFromHash();
      }
    }

    function sendToHost(payload) {
      if (isHost) return;
      if (!hostConn || !hostConn.open) {
        showToast("目前未連上房主");
        return;
      }
      hostConn.send(payload);
    }

    function renameSlot(slot, name) {
      if (!roomId || !state.participants[slot]) return;
      if (!canEditSlot(slot)) return;

      const next = sanitizeNick(name) || SLOT_META[slot].label;
      if (isHost) {
        state.participants[slot].name = next;
        broadcastState();
      } else if (slot === mySlot) {
        sendToHost({ type: "RENAME_ME", name: next });
      }
      if (slot === mySlot) {
        dom.nicknameInput.value = next;
        saveLocalPrefs();
      }
    }

    function changeSlotColor(slot, colorKey) {
      if (!roomId || !state.participants[slot]) return;
      if (!canEditSlot(slot)) return;
      if (!COLOR_OPTIONS[colorKey]) return;

      if (isHost) {
        state.participants[slot].colorKey = colorKey;
        broadcastState();
      } else if (slot === mySlot) {
        sendToHost({ type: "SET_COLOR", colorKey });
      }
    }

    function updateAnswer(slot, floor, value) {
      if (!roomId || !mySlot || slot !== mySlot) return;
      if (value) {
        const occupiedBy = getSelectedSlotByValue(floor, value, slot);
        if (occupiedBy) {
          showToast(`${getSlotName(occupiedBy)} 已選 ${value}`);
          return;
        }
      }
      if (isHost) {
        setAnswerLocal(floor, slot, value);
        broadcastState();
      } else {
        sendToHost({ type: "SET_ANSWER", floor, value });
      }
    }

    function clearBoard() {
      if (!roomId) return;
      if (isHost) {
        for (const slot of SLOT_KEYS) emptyAnswersForSlot(slot);
        broadcastState();
      } else {
        sendToHost({ type: "CLEAR_BOARD" });
      }
    }

    function kickSlot(slot) {
      if (!isHost || !state.participants[slot] || slot === "p1") return;
      const targetPeerId = state.participants[slot].peerId;
      const targetConn = guestConnections.get(targetPeerId)?.conn;
      if (targetConn && targetConn.open) {
        targetConn.send({ type: "KICK", slot });
      }
      emptyAnswersForSlot(slot);
      state.participants[slot] = null;
      guestConnections.delete(targetPeerId);
      try { targetConn && targetConn.close(); } catch (_) {}
      broadcastState();
    }

    async function handleCopyLink() {
      if (!roomId) {
        showToast("請先建立或加入房間");
        return;
      }
      const ok = await copyText(getInviteLink());
      showToast(ok ? "已複製邀請連結" : "複製失敗");
    }

    async function handleCopyRoom() {
      if (!roomId) {
        showToast("請先建立或加入房間");
        return;
      }
      const ok = await copyText(roomId);
      showToast(ok ? "已複製房號" : "複製失敗");
    }

    function validateNick() {
      const nick = sanitizeNick(dom.nicknameInput.value);
      if (!nick) {
        showToast("請先輸入暱稱");
        dom.nicknameInput.focus();
        return "";
      }
      dom.nicknameInput.value = nick;
      saveLocalPrefs();
      return nick;
    }

    async function startHost() {
      if (roomId) {
        showToast("目前已在房間中");
        return;
      }
      const nick = validateNick();
      if (!nick) return;

      const nextRoom = sanitizeRoom(dom.roomInput.value) || generateRoomCode();
      dom.createRoomBtn.disabled = true;
      dom.joinRoomBtn.disabled = true;
      dom.statusSync.textContent = "建立中";
      dom.roomInput.value = nextRoom;

      destroyPeer();
      const lifecycleId = peerLifecycleId;
      state = createEmptyState();
      isHost = true;
      hostReady = false;
      roomId = nextRoom;
      mySlot = "p1";
      loadLocalXMarks();

      try {
        peer = await createPeer(nextRoom);
      } catch (err) {
        console.error(err);
        destroyPeer();
        dom.roomInput.value = nextRoom;
        showToast("PeerJS 載入失敗，請稍後重試");
        refreshAll();
        return;
      }
      if (lifecycleId !== peerLifecycleId) return;

      setupCommonPeerEvents(peer);

      peer.on("open", (id) => {
        if (lifecycleId !== peerLifecycleId) return;
        myPeerId = id;
        roomId = id;
        dom.roomInput.value = id;
        loadLocalXMarks();
        saveLocalPrefs();
        hostPeerId = id;
        hostReady = true;
        state.participants.p1 = {
          slot: "p1",
          name: nick,
          peerId: id,
          isHost: true,
          colorKey: getFirstAvailableColor("", [DEFAULT_SLOT_COLORS.p1]) || DEFAULT_SLOT_COLORS.p1
        };
        normalizeUniqueColors("p1");
        state.updatedAt = nowTs();
        peer.on("connection", (conn) => setupHostConnection(conn));
        window.location.hash = new URLSearchParams({ room: roomId }).toString();
        refreshAll();
        showToast(`房間已建立：${roomId}`);
      });
    }

    async function startJoin() {
      if (roomId) {
        showToast("目前已在房間中");
        return;
      }
      const nick = validateNick();
      if (!nick) return;

      const targetRoom = sanitizeRoom(dom.roomInput.value);
      if (!targetRoom) {
        showToast("請先輸入房號");
        dom.roomInput.focus();
        return;
      }

      dom.createRoomBtn.disabled = true;
      dom.joinRoomBtn.disabled = true;
      dom.statusSync.textContent = "連線中";
      dom.roomInput.value = targetRoom;
      saveLocalPrefs();

      destroyPeer();
      const lifecycleId = peerLifecycleId;
      state = createEmptyState();
      isHost = false;
      roomId = targetRoom;
      hostPeerId = targetRoom;
      loadLocalXMarks();

      try {
        peer = await createPeer();
      } catch (err) {
        console.error(err);
        destroyPeer();
        dom.roomInput.value = targetRoom;
        showToast("PeerJS 載入失敗，請稍後重試");
        refreshAll();
        return;
      }
      if (lifecycleId !== peerLifecycleId) return;

      setupCommonPeerEvents(peer);

      peer.on("open", (id) => {
        if (lifecycleId !== peerLifecycleId) return;
        myPeerId = id;
        const conn = peer.connect(targetRoom, { reliable: true, metadata: { name: nick } });
        setupGuestConnection(conn);
        refreshAll();
      });
    }

    function leaveRoom() {
      if (!roomId) return;
      if (!confirm("確定要離開房間嗎？")) return;

      if (!isHost && hostConn && hostConn.open) {
        try { hostConn.send({ type: "LEAVE_ROOM" }); } catch (_) {}
      }

      if (isHost) {
        for (const { conn, slot } of guestConnections.values()) {
          try { conn.send({ type: "KICK", slot }); } catch (_) {}
        }
      }

      destroyPeer();
      window.location.hash = "";
      restoreLocalPrefs();
      showToast("已離開房間");
    }

    function reconnectStateView() {
      if (roomId) {
        loadLocalXMarks();
      }
      refreshAll();
      showToast("已重新整理畫面狀態");
    }

    function restoreFromHash() {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash) return;
      const params = new URLSearchParams(hash);
      const room = sanitizeRoom(params.get("room") || hash);
      if (room) {
        dom.roomInput.value = room;
      }
    }

    function attachGlobalKickActions() {
      dom.presenceList.addEventListener("click", (event) => {
        const target = event.target.closest("[data-kick-slot]");
        if (!target) return;
        const slot = target.dataset.kickSlot;
        if (slot && confirm(`確定要移除 ${getSlotName(slot)} 嗎？`)) {
          kickSlot(slot);
        }
      });
    }

    dom.createRoomBtn.addEventListener("click", startHost);
    dom.joinRoomBtn.addEventListener("click", startJoin);
    dom.copyLinkBtn.addEventListener("click", handleCopyLink);
    dom.copyRoomBtn.addEventListener("click", handleCopyRoom);
    dom.disconnectBtn.addEventListener("click", leaveRoom);
    dom.clearBoardBtn.addEventListener("click", clearBoard);
    dom.reconnectBtn.addEventListener("click", reconnectStateView);

    dom.nicknameInput.addEventListener("change", () => {
      const next = sanitizeNick(dom.nicknameInput.value);
      dom.nicknameInput.value = next;
      saveLocalPrefs();
      if (mySlot && next && state.participants[mySlot]) {
        renameSlot(mySlot, next);
      }
    });

    window.addEventListener("beforeunload", () => {
      if (!isHost && hostConn && hostConn.open) {
        try { hostConn.send({ type: "LEAVE_ROOM" }); } catch (_) {}
      }
      if (peer) {
        try { peer.destroy(); } catch (_) {}
      }
    });

    restoreLocalPrefs();
    restoreFromHash();
    attachGlobalKickActions();
    requestAnimationFrame(() => refreshAll());
  </script>
</body>
</html>
