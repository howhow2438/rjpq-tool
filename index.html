<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Artale 羅茱平台助手｜PeerJS 共享版</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #162235;
      --line: rgba(255,255,255,.08);
      --text: #eef4ff;
      --muted: #9fb0c7;
      --primary: #4f8cff;
      --primary-2: #2f6ee8;
      --warn: #f59e0b;
      --danger: #ef4444;
      --btn: #1c2a40;
      --shadow: 0 14px 30px rgba(0,0,0,.24);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #0a1020 0%, #0f172a 100%);
      color: var(--text);
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }
    body { padding: 10px; }

    .app {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }

    .title {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 900;
    }

    .sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .mini-chips, .inline-chips, .presence-list, .copy-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-chips { justify-content: flex-end; }

    .chip, .status-pill, .presence-chip {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid rgba(79, 140, 255, .2);
      background: rgba(79, 140, 255, .12);
      color: #dbeafe;
      white-space: nowrap;
    }

    .presence-chip.host {
      background: rgba(245, 158, 11, .14);
      border-color: rgba(245, 158, 11, .28);
      color: #fde68a;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 900;
    }

    .compact-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stack { display: grid; gap: 8px; }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      background: #0d1525;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 15px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: rgba(79, 140, 255, .55);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, .16);
    }

    input[readonly] { opacity: .85; }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
    }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .48; cursor: not-allowed; }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .btn {
      min-height: 42px;
      padding: 10px 12px;
      color: white;
      background: linear-gradient(180deg, var(--primary), var(--primary-2));
    }

    .btn.secondary {
      background: var(--btn);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.warn { background: linear-gradient(180deg, #f59e0b, #ea8500); }
    .btn.danger { background: linear-gradient(180deg, #ef4444, #dc2626); }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .player-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      min-width: 0;
    }

    .player-box.colorized,
    .player-head.colorized {
      border-color: rgba(var(--slot-rgb, 139,92,246), .34);
      background: rgba(var(--slot-rgb, 139,92,246), .12);
    }

    .player-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      padding: 6px 8px;
      border: 1px solid transparent;
      border-radius: 10px;
    }

    .player-title {
      font-size: 12px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--slot-color, #8b5cf6);
      flex: 0 0 auto;
    }

    .player-role {
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--muted);
      white-space: nowrap;
    }

    .player-role.me {
      background: rgba(79,140,255,.18);
      color: #dbeafe;
    }

    .help-line {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
      min-height: 16px;
    }

    .color-picker-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .color-dot {
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      border: 2px solid transparent;
      background: var(--swatch, #8b5cf6);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
    }

    .color-dot.selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,.15);
    }

    .color-dot.used-by-other {
      opacity: .28;
      cursor: not-allowed;
      filter: grayscale(.2);
    }

    .board-card { overflow: hidden; }
    .board-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .local-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toggle-btn {
      min-height: 34px;
      padding: 7px 12px;
      background: var(--btn);
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .toggle-btn.active {
      background: linear-gradient(180deg, #ef4444, #dc2626);
      color: #fff;
      border-color: rgba(239,68,68,.42);
    }

    .board-scroll {
      display: grid;
      gap: 8px;
    }

    .floor-card {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 8px;
      align-items: stretch;
    }

    .floor-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      border-radius: 12px;
      background: #0d1525;
      border: 1px solid var(--line);
      font-weight: 900;
      font-size: 14px;
      color: #dbeafe;
    }

    .shared-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .platform-btn {
      position: relative;
      min-height: 64px;
      padding: 8px 6px;
      border-radius: 12px;
      background: #0d1525;
      border: 1px solid var(--line);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      overflow: hidden;
    }

    .platform-btn:hover:not(:disabled) {
      filter: brightness(1.06);
    }

    .platform-btn.occupied {
      color: #fff;
      border-color: rgba(255,255,255,.16);
      background: linear-gradient(180deg, var(--slot-color, #8b5cf6), var(--slot-color-2, #7c3aed));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .platform-btn.mine {
      box-shadow: 0 0 0 2px rgba(255,255,255,.18), inset 0 0 0 1px rgba(255,255,255,.10);
    }

    .platform-btn.blocked {
      cursor: not-allowed;
    }

    .platform-num {
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
    }

    .platform-name {
      font-size: 11px;
      line-height: 1.15;
      min-height: 13px;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      opacity: .95;
    }

    .x-badge {
      position: absolute;
      top: 4px;
      right: 6px;
      font-size: 16px;
      line-height: 1;
      color: #fca5a5;
      text-shadow: 0 1px 2px rgba(0,0,0,.35);
      pointer-events: none;
    }

    .copy-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .kick-btn {
      margin-left: 6px;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(239,68,68,.14);
      color: #fecaca;
      border: 1px solid rgba(239,68,68,.22);
      font-size: 11px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(15, 23, 42, .96);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 1000;
      white-space: nowrap;
      max-width: calc(100vw - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .online { color: #4ade80; }
    .warn-text { color: #fbbf24; }
    .danger-text { color: #f87171; }

    @media (max-width: 900px) {
      .players-grid,
      .copy-list { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .row-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .title { font-size: 20px; }
      .btn-grid { grid-template-columns: 1fr 1fr; }
      .shared-card { gap: 6px; padding: 6px; }
      .platform-btn { min-height: 58px; padding: 7px 4px; }
      .platform-num { font-size: 17px; }
      .platform-name { font-size: 10px; }
      .floor-card { grid-template-columns: 52px 1fr; }
      .hint { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card header">
      <div>
        <h1 class="title">Artale 羅茱平台助手</h1>
        <div class="sub">共用樓層卡片｜同一層 1~4 不可重複｜X 註記僅自己可見</div>
      </div>
      <div class="mini-chips">
        <span class="chip">PeerJS</span>
        <span class="chip">手機可用</span>
      </div>
    </section>

    <section class="card">
      <div class="stack">
        <div class="row-3">
          <div>
            <label class="label" for="nicknameInput">我的暱稱</label>
            <input id="nicknameInput" type="text" maxlength="20" placeholder="例如：隊長 / 主教" />
          </div>
          <div>
            <label class="label" for="roomInput">房號</label>
            <input id="roomInput" type="text" maxlength="40" placeholder="例如：RJ-8421" />
          </div>
          <div style="display:flex;align-items:flex-end;">
            <button class="btn secondary" id="copyRoomBtn" style="width:100%;">複製房號</button>
          </div>
        </div>

        <div class="btn-grid">
          <button class="btn" id="createRoomBtn">建立新房</button>
          <button class="btn secondary" id="joinRoomBtn">加入房間</button>
          <button class="btn secondary" id="copyLinkBtn">複製邀請連結</button>
          <button class="btn danger" id="disconnectBtn">離開房間</button>
        </div>

        <div class="inline-chips">
          <span class="status-pill">房間：<strong id="statusRoom">未加入</strong></span>
          <span class="status-pill">角色：<strong id="statusRole">未加入</strong></span>
          <span class="status-pill">連線：<strong id="statusSync">尚未連線</strong></span>
          <span class="status-pill">人數：<strong id="statusPeers">0</strong></span>
          <span class="status-pill">更新：<strong id="lastUpdated">--</strong></span>
        </div>

        <div class="presence-list" id="presenceList">
          <span class="presence-chip">尚未加入房間</span>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="compact-head">
        <h2 class="section-title" style="margin:0;">玩家設定</h2>
        <div class="hint">顏色不可重複；只能改自己的資料</div>
      </div>
      <div class="players-grid" id="playerInputs"></div>
    </section>

    <section class="card board-card">
      <div class="board-toolbar">
        <h2 class="section-title" style="margin:0;">平台記錄</h2>
        <div class="local-tools">
          <button class="toggle-btn" id="xModeBtn">X 註記模式：關</button>
          <button class="btn warn" id="clearBoardBtn">清空本房答案</button>
          <button class="btn secondary" id="clearLocalXBtn">清空我的 X</button>
        </div>
      </div>
      <div class="board-scroll" id="boardBody"></div>
    </section>

    <section class="card">
      <h2 class="section-title">單人複製</h2>
      <div class="copy-list" id="copyPlayerActions"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SLOT_KEYS = ["p1", "p2", "p3", "p4"];
    const FLOORS = Array.from({ length: 10 }, (_, i) => i + 1);
    const DISPLAY_FLOORS = [...FLOORS].reverse();
    const COLOR_OPTIONS = {
      purple: { label: "紫色", color: "#8b5cf6", color2: "#7c3aed", rgb: "139,92,246" },
      green:  { label: "綠色", color: "#22c55e", color2: "#16a34a", rgb: "34,197,94" },
      yellow: { label: "黃色", color: "#facc15", color2: "#eab308", rgb: "250,204,21" },
      red:    { label: "紅色", color: "#ef4444", color2: "#dc2626", rgb: "239,68,68" }
    };
    const DEFAULT_SLOT_COLORS = { p1: "purple", p2: "green", p3: "yellow", p4: "red" };
    const SLOT_META = {
      p1: { label: "玩家1" },
      p2: { label: "玩家2" },
      p3: { label: "玩家3" },
      p4: { label: "玩家4" }
    };

    const $ = (id) => document.getElementById(id);
    const dom = {
      nicknameInput: $("nicknameInput"),
      roomInput: $("roomInput"),
      createRoomBtn: $("createRoomBtn"),
      joinRoomBtn: $("joinRoomBtn"),
      copyLinkBtn: $("copyLinkBtn"),
      copyRoomBtn: $("copyRoomBtn"),
      disconnectBtn: $("disconnectBtn"),
      clearBoardBtn: $("clearBoardBtn"),
      clearLocalXBtn: $("clearLocalXBtn"),
      xModeBtn: $("xModeBtn"),
      statusRoom: $("statusRoom"),
      statusRole: $("statusRole"),
      statusSync: $("statusSync"),
      statusPeers: $("statusPeers"),
      lastUpdated: $("lastUpdated"),
      presenceList: $("presenceList"),
      playerInputs: $("playerInputs"),
      boardBody: $("boardBody"),
      copyPlayerActions: $("copyPlayerActions"),
      toast: $("toast")
    };

    let peer = null;
    let isHost = false;
    let roomId = "";
    let myPeerId = "";
    let mySlot = "";
    let hostConn = null;
    let hostPeerId = "";
    let hostReady = false;
    let xMode = false;
    let localXMarks = {};
    let localPeerLifecycle = 0;
    const guestConnections = new Map();
    let peerScriptPromise = null;

    let state = createEmptyState();

    function createEmptyAnswers() {
      const answers = {};
      FLOORS.forEach((floor) => {
        answers[String(floor)] = {};
        SLOT_KEYS.forEach((slot) => answers[String(floor)][slot] = "");
      });
      return answers;
    }

    function createEmptyState() {
      const participants = {};
      SLOT_KEYS.forEach((slot) => participants[slot] = null);
      return { participants, answers: createEmptyAnswers(), updatedAt: 0 };
    }

    function nowTs() { return Date.now(); }

    function sanitizeRoom(value) {
      return String(value || "").trim().replace(/\s+/g, "").replace(/[^A-Za-z0-9\-_]/g, "").slice(0, 80);
    }

    function sanitizeNick(value) {
      return String(value || "").trim().replace(/\s+/g, " ").slice(0, 20);
    }

    function generateRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let result = "RJ-";
      for (let i = 0; i < 6; i++) result += chars[Math.floor(Math.random() * chars.length)];
      return result;
    }

    function showToast(message) {
      dom.toast.textContent = message;
      dom.toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => dom.toast.classList.remove("show"), 1800);
    }

    async function copyText(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (_) {}
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        return true;
      } catch (_) { return false; }
    }

    function getInviteLink() {
      if (!roomId) return "";
      const url = new URL(window.location.href);
      const params = new URLSearchParams();
      params.set("room", roomId);
      url.hash = params.toString();
      return url.toString();
    }

    function saveLocalPrefs() {
      localStorage.setItem("rjpq_peerjs_nick", dom.nicknameInput.value.trim());
    }

    function restoreLocalPrefs() {
      const nick = localStorage.getItem("rjpq_peerjs_nick") || "";
      if (nick) dom.nicknameInput.value = nick;
    }

    function xStorageKey() {
      return roomId ? `rjpq_xmarks_${roomId}` : "";
    }

    function loadLocalXMarks() {
      localXMarks = {};
      const key = xStorageKey();
      if (!key) return;
      try {
        const parsed = JSON.parse(localStorage.getItem(key) || "{}");
        if (parsed && typeof parsed === "object") localXMarks = parsed;
      } catch (_) {
        localXMarks = {};
      }
    }

    function saveLocalXMarks() {
      const key = xStorageKey();
      if (!key) return;
      localStorage.setItem(key, JSON.stringify(localXMarks));
    }

    function getLocalXKey(floor, value) {
      return `${floor}:${value}`;
    }

    function hasLocalX(floor, value) {
      return !!localXMarks[getLocalXKey(floor, value)];
    }

    function toggleLocalX(floor, value) {
      if (!roomId) {
        showToast("請先建立或加入房間");
        return;
      }
      const key = getLocalXKey(floor, value);
      if (localXMarks[key]) delete localXMarks[key];
      else localXMarks[key] = 1;
      saveLocalXMarks();
      renderBoard();
    }

    function clearLocalXMarks() {
      localXMarks = {};
      saveLocalXMarks();
      renderBoard();
      showToast("已清空我的 X 註記");
    }

    function getConnectedParticipants() {
      return SLOT_KEYS.map((slot) => state.participants[slot]).filter(Boolean);
    }

    function getSlotName(slot) {
      return state.participants[slot]?.name || SLOT_META[slot].label;
    }

    function getColorKey(slot) {
      return state.participants[slot]?.colorKey || DEFAULT_SLOT_COLORS[slot] || "purple";
    }

    function themeStyle(slot) {
      const theme = COLOR_OPTIONS[getColorKey(slot)] || COLOR_OPTIONS.purple;
      return `--slot-color:${theme.color};--slot-color-2:${theme.color2};--slot-rgb:${theme.rgb};`;
    }

    function getAnswer(floor, slot) {
      return state.answers[String(floor)]?.[slot] || "";
    }

    function getOccupiedSlot(floor, value) {
      const v = String(value);
      return SLOT_KEYS.find((slot) => getAnswer(floor, slot) === v) || "";
    }

    function emptyAnswersForSlot(slot) {
      if (!slot) return;
      FLOORS.forEach((floor) => { state.answers[String(floor)][slot] = ""; });
    }

    function setAnswerLocal(floor, slot, value) {
      const key = String(floor);
      if (!state.answers[key]) state.answers[key] = {};
      SLOT_KEYS.forEach((s) => {
        if (!(s in state.answers[key])) state.answers[key][s] = "";
      });
      if (!value) {
        state.answers[key][slot] = "";
      } else {
        SLOT_KEYS.forEach((s) => {
          if (s !== slot && state.answers[key][s] === String(value)) {
            state.answers[key][s] = "";
          }
        });
        state.answers[key][slot] = String(value);
      }
      state.updatedAt = nowTs();
    }

    function buildPlayerReport(slot) {
      const name = getSlotName(slot);
      const digits = FLOORS.map((floor) => String(getAnswer(floor, slot) || 0));
      return `${name}: ${digits.slice(0, 5).join("")}/${digits.slice(5).join("")}`;
    }

    function canEditSlot(slot) {
      return !!roomId && mySlot === slot;
    }

    function setStatusText(el, text, kind) {
      el.textContent = text;
      el.className = "";
      if (kind) el.classList.add(kind);
    }

    function renderStatus() {
      dom.statusRoom.textContent = roomId || "未加入";
      dom.statusRole.textContent = !roomId ? "未加入" : (isHost ? "房主" : (mySlot ? `${SLOT_META[mySlot].label}` : "成員"));
      if (!roomId) {
        setStatusText(dom.statusSync, "尚未連線", "");
      } else if (isHost) {
        setStatusText(dom.statusSync, hostReady ? "房主待命中" : "建立中", hostReady ? "online" : "warn-text");
      } else if (hostConn && hostConn.open) {
        setStatusText(dom.statusSync, "已連上房主", "online");
      } else {
        setStatusText(dom.statusSync, "等待房主", "warn-text");
      }

      dom.statusPeers.textContent = String(getConnectedParticipants().length);
      dom.lastUpdated.textContent = state.updatedAt
        ? new Date(state.updatedAt).toLocaleTimeString("zh-TW", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" })
        : "--";

      dom.createRoomBtn.disabled = !!roomId;
      dom.joinRoomBtn.disabled = !!roomId;
      dom.copyLinkBtn.disabled = !roomId;
      dom.copyRoomBtn.disabled = !roomId;
      dom.disconnectBtn.disabled = !roomId;
      dom.clearBoardBtn.disabled = !roomId;
      dom.clearLocalXBtn.disabled = !roomId;
      dom.roomInput.readOnly = !!roomId;
      dom.xModeBtn.classList.toggle("active", xMode);
      dom.xModeBtn.textContent = `X 註記模式：${xMode ? "開" : "關"}`;
    }

    function renderPresence() {
      const list = getConnectedParticipants();
      if (!list.length) {
        dom.presenceList.innerHTML = '<span class="presence-chip">尚未加入房間</span>';
        return;
      }
      dom.presenceList.innerHTML = "";
      list.forEach((participant) => {
        const slot = participant.slot;
        const wrapper = document.createElement("span");
        wrapper.className = `presence-chip${participant.isHost ? " host" : ""}`;
        wrapper.textContent = `${SLOT_META[slot].label}｜${participant.name}${slot === mySlot ? "（我）" : ""}${participant.isHost ? "｜房主" : ""}`;
        if (isHost && !participant.isHost) {
          const btn = document.createElement("button");
          btn.className = "kick-btn";
          btn.textContent = "移除";
          btn.dataset.kickSlot = slot;
          wrapper.appendChild(document.createTextNode(" "));
          wrapper.appendChild(btn);
        }
        dom.presenceList.appendChild(wrapper);
      });
    }

    function isColorUsed(colorKey, exceptSlot = "") {
      return SLOT_KEYS.some((slot) => slot !== exceptSlot && state.participants[slot]?.colorKey === colorKey);
    }

    function renderPlayers() {
      dom.playerInputs.innerHTML = "";
      SLOT_KEYS.forEach((slot) => {
        const participant = state.participants[slot];
        const isMine = mySlot === slot;
        const canEdit = canEditSlot(slot) && !!participant;
        const role = participant ? (participant.isHost ? "房主" : (isMine ? "我的欄位" : "隊友")) : "空位";
        const box = document.createElement("div");
        box.className = "player-box colorized";
        box.style.cssText = themeStyle(slot);

        const colorButtons = Object.entries(COLOR_OPTIONS).map(([key, option]) => {
          const usedByOther = isColorUsed(key, slot);
          return `
            <button
              type="button"
              class="color-dot ${getColorKey(slot) === key ? "selected" : ""} ${usedByOther ? "used-by-other" : ""}"
              data-slot="${slot}"
              data-color="${key}"
              style="--swatch:${option.color}"
              ${!canEdit || usedByOther ? "disabled" : ""}
              title="${option.label}"
            ></button>`;
        }).join("");

        box.innerHTML = `
          <div class="player-head colorized" style="${themeStyle(slot)}">
            <div class="player-title"><span class="swatch" style="${themeStyle(slot)}"></span><span>${SLOT_META[slot].label}</span></div>
            <div class="player-role ${isMine ? "me" : ""}">${role}</div>
          </div>
          <label class="label" for="name-${slot}">顯示名稱</label>
          <input id="name-${slot}" type="text" maxlength="20" value="${participant ? escapeHtml(participant.name) : ""}" placeholder="${SLOT_META[slot].label}" ${canEdit ? "" : "readonly"} />
          <div class="help-line">顏色：${COLOR_OPTIONS[getColorKey(slot)]?.label || "紫色"}${participant ? `｜ID ${participant.peerId.slice(0, 8)}` : ""}</div>
          <div class="color-picker-row">${colorButtons}</div>
        `;
        dom.playerInputs.appendChild(box);

        const input = box.querySelector(`#name-${slot}`);
        input.addEventListener("change", () => {
          const next = sanitizeNick(input.value) || SLOT_META[slot].label;
          input.value = next;
          renameSlot(slot, next);
        });

        box.querySelectorAll(".color-dot").forEach((btn) => {
          btn.addEventListener("click", () => changeSlotColor(slot, btn.dataset.color));
        });
      });
    }

    function renderCopyActions() {
      dom.copyPlayerActions.innerHTML = "";
      SLOT_KEYS.forEach((slot) => {
        const btn = document.createElement("button");
        btn.className = "btn secondary";
        btn.textContent = `複製 ${getSlotName(slot)}`;
        btn.disabled = !state.participants[slot];
        btn.addEventListener("click", async () => {
          const ok = await copyText(buildPlayerReport(slot));
          showToast(ok ? `已複製 ${getSlotName(slot)}` : "複製失敗");
        });
        dom.copyPlayerActions.appendChild(btn);
      });
    }

    function renderBoard() {
      const rows = DISPLAY_FLOORS.map((floor) => {
        const buttons = [1,2,3,4].map((num) => {
          const occupiedSlot = getOccupiedSlot(floor, num);
          const occupied = !!occupiedSlot;
          const mine = occupiedSlot && occupiedSlot === mySlot;
          const ownerName = occupied ? getSlotName(occupiedSlot) : "";
          const canPick = !!roomId && !!mySlot && (!occupied || mine);
          const classes = ["platform-btn"];
          let style = "";
          if (occupiedSlot) {
            classes.push("occupied");
            style = themeStyle(occupiedSlot);
            if (mine) classes.push("mine");
            else classes.push("blocked");
          }
          return `
            <button
              type="button"
              class="${classes.join(" ")}"
              style="${style}"
              data-floor="${floor}"
              data-value="${num}"
              ${!roomId || !mySlot ? "disabled" : ""}
              aria-label="${floor}F 平台 ${num}"
            >
              <span class="platform-num">${num}</span>
              <span class="platform-name">${ownerName || ""}</span>
              ${hasLocalX(floor, num) ? '<span class="x-badge">✕</span>' : ""}
            </button>
          `;
        }).join("");

        return `
          <div class="floor-card">
            <div class="floor-badge">${floor}F</div>
            <div class="shared-card">${buttons}</div>
          </div>
        `;
      }).join("");

      dom.boardBody.innerHTML = rows;

      dom.boardBody.querySelectorAll(".platform-btn").forEach((btn) => {
        const floor = Number(btn.dataset.floor);
        const value = btn.dataset.value;
        btn.addEventListener("click", () => {
          if (xMode) {
            toggleLocalX(floor, value);
            return;
          }
          chooseSharedValue(floor, value);
        });
        btn.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          toggleLocalX(floor, value);
        });
      });
    }

    function chooseSharedValue(floor, value) {
      if (!roomId || !mySlot) {
        showToast("請先建立或加入房間");
        return;
      }
      const occupiedSlot = getOccupiedSlot(floor, value);
      if (occupiedSlot && occupiedSlot !== mySlot) {
        showToast(`${getSlotName(occupiedSlot)} 已選 ${value}`);
        return;
      }
      const current = getAnswer(floor, mySlot);
      const next = current === String(value) ? "" : String(value);
      updateMyAnswer(floor, next);
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[m]);
    }

    function refreshAll() {
      renderStatus();
      renderPresence();
      renderPlayers();
      renderBoard();
      renderCopyActions();
    }

    function broadcastState() {
      if (!isHost) return;
      state.updatedAt = nowTs();
      for (const { conn } of guestConnections.values()) {
        if (conn.open) conn.send({ type: "STATE_SYNC", state });
      }
      refreshAll();
    }

    function findSlotByPeerId(peerId) {
      return SLOT_KEYS.find((slot) => state.participants[slot]?.peerId === peerId) || "";
    }

    function getFreeSlot() {
      return SLOT_KEYS.find((slot) => !state.participants[slot]) || "";
    }

    function getAvailableColor() {
      const used = new Set(SLOT_KEYS.map((slot) => state.participants[slot]?.colorKey).filter(Boolean));
      return Object.keys(COLOR_OPTIONS).find((key) => !used.has(key)) || "purple";
    }

    function ensurePeerJsLoaded() {
      if (window.Peer) return Promise.resolve();
      if (peerScriptPromise) return peerScriptPromise;
      peerScriptPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js";
        script.async = true;
        script.onload = () => resolve();
        script.onerror = () => { peerScriptPromise = null; reject(new Error("PEERJS_LOAD_FAILED")); };
        document.head.appendChild(script);
      });
      return peerScriptPromise;
    }

    async function createPeer(peerId) {
      await ensurePeerJsLoaded();
      return new Peer(peerId || undefined, {
        debug: 1,
        pingInterval: 4000,
        config: {
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" }
          ]
        }
      });
    }

    function destroyPeer() {
      localPeerLifecycle += 1;
      if (hostConn) {
        try { hostConn.close(); } catch (_) {}
      }
      for (const { conn } of guestConnections.values()) {
        try { conn.close(); } catch (_) {}
      }
      guestConnections.clear();
      if (peer) {
        try { peer.destroy(); } catch (_) {}
      }
      peer = null;
      isHost = false;
      roomId = "";
      myPeerId = "";
      mySlot = "";
      hostConn = null;
      hostPeerId = "";
      hostReady = false;
      state = createEmptyState();
      xMode = false;
      localXMarks = {};
      refreshAll();
    }

    function setupCommonPeerEvents(localPeer) {
      localPeer.on("error", (err) => {
        console.error(err);
        if (err.type === "unavailable-id") {
          showToast("房號已被使用，請換一個");
        } else if (err.type === "peer-unavailable") {
          showToast("找不到房號，請確認是否正確");
        } else {
          showToast(`連線錯誤：${err.type || "unknown"}`);
        }
        if (!roomId) {
          const keepRoom = dom.roomInput.value;
          destroyPeer();
          dom.roomInput.value = keepRoom;
        }
        renderStatus();
      });

      localPeer.on("disconnected", () => {
        setStatusText(dom.statusSync, "連線中斷", "danger-text");
        if (isHost && localPeer && !localPeer.destroyed) {
          try { localPeer.reconnect(); } catch (_) {}
        }
      });
    }

    function setupHostConnection(conn) {
      conn.on("data", (msg) => handleHostMessage(conn, msg));
      conn.on("close", () => {
        const slot = guestConnections.get(conn.peer)?.slot || findSlotByPeerId(conn.peer);
        guestConnections.delete(conn.peer);
        if (slot && state.participants[slot]) {
          emptyAnswersForSlot(slot);
          state.participants[slot] = null;
          broadcastState();
          showToast(`${SLOT_META[slot].label} 已離線`);
        } else {
          refreshAll();
        }
      });
      conn.on("error", (err) => console.error(err));
    }

    function handleHostMessage(conn, msg) {
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "JOIN_REQUEST") {
        const freeSlot = getFreeSlot();
        if (!freeSlot) {
          conn.send({ type: "JOIN_REJECT", reason: "房間已滿（上限 4 人）" });
          return;
        }
        const requestedName = sanitizeNick(msg.name) || SLOT_META[freeSlot].label;
        state.participants[freeSlot] = {
          slot: freeSlot,
          name: requestedName,
          peerId: conn.peer,
          isHost: false,
          colorKey: getAvailableColor()
        };
        guestConnections.set(conn.peer, { conn, slot: freeSlot });
        conn.send({ type: "JOIN_ACCEPT", slot: freeSlot, roomId, hostPeerId: myPeerId });
        broadcastState();
        showToast(`${requestedName} 已加入 ${SLOT_META[freeSlot].label}`);
        return;
      }

      const senderSlot = guestConnections.get(conn.peer)?.slot || findSlotByPeerId(conn.peer);
      if (!senderSlot) return;

      if (msg.type === "RENAME_ME") {
        const next = sanitizeNick(msg.name) || SLOT_META[senderSlot].label;
        state.participants[senderSlot].name = next;
        broadcastState();
        return;
      }

      if (msg.type === "SET_COLOR") {
        if (!COLOR_OPTIONS[msg.colorKey]) return;
        if (isColorUsed(msg.colorKey, senderSlot)) {
          conn.send({ type: "ACTION_REJECT", reason: "這個顏色已被其他人選走" });
          return;
        }
        state.participants[senderSlot].colorKey = msg.colorKey;
        broadcastState();
        return;
      }

      if (msg.type === "SET_ANSWER") {
        const floor = Number(msg.floor);
        const value = String(msg.value || "");
        if (!FLOORS.includes(floor)) return;
        if (value && !["1","2","3","4"].includes(value)) return;
        const occupiedSlot = value ? getOccupiedSlot(floor, value) : "";
        if (occupiedSlot && occupiedSlot !== senderSlot) {
          conn.send({ type: "ACTION_REJECT", reason: `${getSlotName(occupiedSlot)} 已經選了 ${value}` });
          broadcastState();
          return;
        }
        setAnswerLocal(floor, senderSlot, value);
        broadcastState();
        return;
      }

      if (msg.type === "CLEAR_BOARD") {
        SLOT_KEYS.forEach((slot) => emptyAnswersForSlot(slot));
        broadcastState();
        return;
      }

      if (msg.type === "LEAVE_ROOM") {
        emptyAnswersForSlot(senderSlot);
        state.participants[senderSlot] = null;
        guestConnections.delete(conn.peer);
        try { conn.close(); } catch (_) {}
        broadcastState();
      }
    }

    function setupGuestConnection(conn) {
      hostConn = conn;
      conn.on("open", () => {
        setStatusText(dom.statusSync, "已連上房主", "online");
        conn.send({ type: "JOIN_REQUEST", name: sanitizeNick(dom.nicknameInput.value) || "玩家" });
      });
      conn.on("data", (msg) => handleGuestMessage(msg));
      conn.on("close", () => {
        if (roomId) showToast("房主已離線或房間已關閉");
        destroyPeer();
        restoreFromHash();
      });
      conn.on("error", (err) => {
        console.error(err);
        showToast("連線到房主失敗");
      });
    }

    function handleGuestMessage(msg) {
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "JOIN_ACCEPT") {
        mySlot = msg.slot;
        roomId = msg.roomId;
        hostPeerId = msg.hostPeerId;
        loadLocalXMarks();
        window.location.hash = new URLSearchParams({ room: roomId }).toString();
        saveLocalPrefs();
        refreshAll();
        return;
      }

      if (msg.type === "JOIN_REJECT") {
        showToast(msg.reason || "加入失敗");
        destroyPeer();
        restoreFromHash();
        return;
      }

      if (msg.type === "ACTION_REJECT") {
        showToast(msg.reason || "操作失敗");
        return;
      }

      if (msg.type === "STATE_SYNC" && msg.state) {
        state = msg.state;
        const found = findSlotByPeerId(myPeerId);
        if (found) mySlot = found;
        refreshAll();
      }

      if (msg.type === "KICK" && msg.slot === mySlot) {
        showToast("你已被房主移出房間");
        destroyPeer();
        restoreFromHash();
      }
    }

    function sendToHost(payload) {
      if (isHost) return;
      if (!hostConn || !hostConn.open) {
        showToast("目前未連上房主");
        return;
      }
      hostConn.send(payload);
    }

    function renameSlot(slot, name) {
      if (!roomId || !state.participants[slot]) return;
      if (!canEditSlot(slot)) return;
      const next = sanitizeNick(name) || SLOT_META[slot].label;
      if (isHost) {
        state.participants[slot].name = next;
        broadcastState();
      } else {
        sendToHost({ type: "RENAME_ME", name: next });
      }
      if (slot === mySlot) {
        dom.nicknameInput.value = next;
        saveLocalPrefs();
      }
    }

    function changeSlotColor(slot, colorKey) {
      if (!roomId || !canEditSlot(slot)) return;
      if (!COLOR_OPTIONS[colorKey]) return;
      if (isColorUsed(colorKey, slot)) {
        showToast("這個顏色已被其他人選走");
        return;
      }
      if (isHost) {
        state.participants[slot].colorKey = colorKey;
        broadcastState();
      } else {
        sendToHost({ type: "SET_COLOR", colorKey });
      }
    }

    function updateMyAnswer(floor, value) {
      if (!roomId || !mySlot) return;
      if (isHost) {
        const occupiedSlot = value ? getOccupiedSlot(floor, value) : "";
        if (occupiedSlot && occupiedSlot !== mySlot) {
          showToast(`${getSlotName(occupiedSlot)} 已經選了 ${value}`);
          return;
        }
        setAnswerLocal(floor, mySlot, value);
        broadcastState();
      } else {
        sendToHost({ type: "SET_ANSWER", floor, value });
      }
    }

    function clearBoard() {
      if (!roomId) return;
      if (isHost) {
        SLOT_KEYS.forEach((slot) => emptyAnswersForSlot(slot));
        broadcastState();
      } else {
        sendToHost({ type: "CLEAR_BOARD" });
      }
    }

    function kickSlot(slot) {
      if (!isHost || !state.participants[slot] || slot === "p1") return;
      const targetPeerId = state.participants[slot].peerId;
      const targetConn = guestConnections.get(targetPeerId)?.conn;
      if (targetConn && targetConn.open) targetConn.send({ type: "KICK", slot });
      emptyAnswersForSlot(slot);
      state.participants[slot] = null;
      guestConnections.delete(targetPeerId);
      try { targetConn && targetConn.close(); } catch (_) {}
      broadcastState();
    }

    async function handleCopyLink() {
      if (!roomId) return showToast("請先建立或加入房間");
      const ok = await copyText(getInviteLink());
      showToast(ok ? "已複製邀請連結" : "複製失敗");
    }

    async function handleCopyRoom() {
      if (!roomId) return showToast("請先建立或加入房間");
      const ok = await copyText(roomId);
      showToast(ok ? "已複製房號" : "複製失敗");
    }

    function validateNick() {
      const nick = sanitizeNick(dom.nicknameInput.value);
      if (!nick) {
        showToast("請先輸入暱稱");
        dom.nicknameInput.focus();
        return "";
      }
      dom.nicknameInput.value = nick;
      saveLocalPrefs();
      return nick;
    }

    async function startHost() {
      if (roomId) return showToast("目前已在房間中");
      const nick = validateNick();
      if (!nick) return;
      const nextRoom = sanitizeRoom(dom.roomInput.value) || generateRoomCode();
      dom.roomInput.value = nextRoom;
      saveLocalPrefs();

      destroyPeer();
      state = createEmptyState();
      isHost = true;
      hostReady = false;
      roomId = nextRoom;
      mySlot = "p1";
      loadLocalXMarks();

      try {
        peer = await createPeer(nextRoom);
      } catch (_) {
        showToast("PeerJS 載入失敗");
        destroyPeer();
        dom.roomInput.value = nextRoom;
        return;
      }

      setupCommonPeerEvents(peer);
      peer.on("open", (id) => {
        myPeerId = id;
        roomId = id;
        hostPeerId = id;
        hostReady = true;
        state.participants.p1 = {
          slot: "p1",
          name: nick,
          peerId: id,
          isHost: true,
          colorKey: DEFAULT_SLOT_COLORS.p1
        };
        state.updatedAt = nowTs();
        peer.on("connection", (conn) => setupHostConnection(conn));
        window.location.hash = new URLSearchParams({ room: roomId }).toString();
        refreshAll();
        showToast(`房間已建立：${roomId}`);
      });
    }

    async function startJoin() {
      if (roomId) return showToast("目前已在房間中");
      const nick = validateNick();
      if (!nick) return;
      const targetRoom = sanitizeRoom(dom.roomInput.value);
      if (!targetRoom) {
        showToast("請先輸入房號");
        dom.roomInput.focus();
        return;
      }
      saveLocalPrefs();

      destroyPeer();
      state = createEmptyState();
      isHost = false;
      roomId = targetRoom;
      hostPeerId = targetRoom;
      loadLocalXMarks();

      try {
        peer = await createPeer();
      } catch (_) {
        showToast("PeerJS 載入失敗");
        destroyPeer();
        dom.roomInput.value = targetRoom;
        return;
      }

      setupCommonPeerEvents(peer);
      peer.on("open", (id) => {
        myPeerId = id;
        const conn = peer.connect(targetRoom, { reliable: true, metadata: { name: nick } });
        setupGuestConnection(conn);
        refreshAll();
      });
    }

    function leaveRoom() {
      if (!roomId) return;
      if (!confirm("確定要離開房間嗎？")) return;
      if (!isHost && hostConn && hostConn.open) {
        try { hostConn.send({ type: "LEAVE_ROOM" }); } catch (_) {}
      }
      if (isHost) {
        for (const { conn, slot } of guestConnections.values()) {
          try { conn.send({ type: "KICK", slot }); } catch (_) {}
        }
      }
      destroyPeer();
      window.location.hash = "";
      restoreLocalPrefs();
      showToast("已離開房間");
    }

    function restoreFromHash() {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash) return;
      const params = new URLSearchParams(hash);
      const room = sanitizeRoom(params.get("room") || hash);
      if (room) dom.roomInput.value = room;
    }

    function attachGlobalKickActions() {
      dom.presenceList.addEventListener("click", (event) => {
        const target = event.target.closest("[data-kick-slot]");
        if (!target) return;
        const slot = target.dataset.kickSlot;
        if (slot && confirm(`確定要移除 ${getSlotName(slot)} 嗎？`)) kickSlot(slot);
      });
    }

    dom.createRoomBtn.addEventListener("click", startHost);
    dom.joinRoomBtn.addEventListener("click", startJoin);
    dom.copyLinkBtn.addEventListener("click", handleCopyLink);
    dom.copyRoomBtn.addEventListener("click", handleCopyRoom);
    dom.disconnectBtn.addEventListener("click", leaveRoom);
    dom.clearBoardBtn.addEventListener("click", clearBoard);
    dom.clearLocalXBtn.addEventListener("click", clearLocalXMarks);
    dom.xModeBtn.addEventListener("click", () => {
      xMode = !xMode;
      renderStatus();
      showToast(xMode ? "X 註記模式已開啟" : "X 註記模式已關閉");
    });

    dom.nicknameInput.addEventListener("change", () => {
      const next = sanitizeNick(dom.nicknameInput.value);
      dom.nicknameInput.value = next;
      saveLocalPrefs();
      if (mySlot && next && state.participants[mySlot]) renameSlot(mySlot, next);
    });

    window.addEventListener("beforeunload", () => {
      if (!isHost && hostConn && hostConn.open) {
        try { hostConn.send({ type: "LEAVE_ROOM" }); } catch (_) {}
      }
      if (peer) {
        try { peer.destroy(); } catch (_) {}
      }
    });

    restoreLocalPrefs();
    restoreFromHash();
    attachGlobalKickActions();
    refreshAll();
  </script>
</body>
</html>
