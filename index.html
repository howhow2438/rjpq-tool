<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Artale 羅茱平台助手</title>

  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #162235;
      --line: rgba(255,255,255,.08);
      --text: #eef4ff;
      --muted: #9fb0c7;
      --primary: #4f8cff;
      --primary-2: #2f6ee8;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --btn: #1c2a40;
      --shadow: 0 14px 30px rgba(0,0,0,.24);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #0a1020 0%, #0f172a 100%);
      color: var(--text);
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }

    body { padding: 8px; }

    .app {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      gap: 8px;
      padding-bottom: calc(88px + env(safe-area-inset-bottom));
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 15px;
      box-shadow: var(--shadow);
      padding: 10px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px;
    }

    .title {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 900;
    }

    .sub {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }

    .mini-chips, .presence-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .inline-chips {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      align-items: stretch;
    }

    .mini-chips { justify-content: flex-end; }

    .chip, .status-pill, .presence-chip {
      padding: 4px 7px;
      border-radius: 10px;
      font-size: 9px;
      border: 1px solid rgba(79, 140, 255, .2);
      background: rgba(79, 140, 255, .12);
      color: #dbeafe;
      white-space: nowrap;
    }

    .status-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      min-height: 28px;
      padding: 4px 7px;
      border-radius: 9px;
      white-space: nowrap;
      overflow: hidden;
    }

    .status-pill strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .presence-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 6px;
    }

    .presence-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 34px;
      border-radius: 10px;
      white-space: normal;
    }

    .status-pill strong.online { color: #86efac; }
    .status-pill strong.warn-text { color: #fde68a; }

    .presence-chip.host {
      background: rgba(245, 158, 11, .14);
      border-color: rgba(245, 158, 11, .28);
      color: #fde68a;
    }

    .presence-chip.offline {
      opacity: .88;
      filter: saturate(.85);
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 900;
    }

    .compact-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    .hint {
      font-size: 8px;
      color: var(--muted);
      white-space: nowrap;
    }

    .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stack { display: grid; gap: 8px; }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      background: #0d1525;
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: rgba(79, 140, 255, .55);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, .16);
    }

    input[readonly] {
      opacity: .85;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
    }

    button:active { transform: scale(.98); }
    button:disabled { opacity: .48; cursor: not-allowed; }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .btn {
      min-height: 36px;
      padding: 8px 10px;
      color: white;
      background: linear-gradient(180deg, var(--primary), var(--primary-2));
    }

    .btn.secondary {
      background: var(--btn);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.warn {
      background: linear-gradient(180deg, #f59e0b, #ea8500);
    }

    .btn.danger {
      background: linear-gradient(180deg, #ef4444, #dc2626);
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 6px;
    }

    .player-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 6px 7px;
      min-width: 0;
    }

    .player-head {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      align-items: center;
      margin-bottom: 4px;
    }

    .player-title {
      font-size: 10px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .player-role {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--muted);
    }

    .player-role.me {
      background: rgba(79,140,255,.18);
      color: #dbeafe;
    }

    .player-role.offline {
      background: rgba(245,158,11,.15);
      color: #fde68a;
    }

    .player-box.colorized,
    .player-head.colorized {
      border-color: rgba(var(--slot-rgb, 139,92,246), .34);
      background: rgba(var(--slot-rgb, 139,92,246), .12);
    }

    .player-box.colorized input {
      border-color: rgba(var(--slot-rgb, 139,92,246), .28);
    }

    .help-line {
      font-size: 9px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.25;
    }

    .board-card {
      padding: 8px;
      position: relative;
      overflow: hidden;
    }

    .board-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      position: sticky;
      top: 0;
      z-index: 5;
      padding-bottom: 6px;
      background: linear-gradient(180deg, rgba(17,26,43,.98) 0%, rgba(17,26,43,.94) 82%, rgba(17,26,43,0) 100%);
      backdrop-filter: blur(8px);
    }

    .board-scroll {
      display: grid;
      gap: 4px;
      max-height: none;
      overflow: visible;
      padding-right: 0;
      overscroll-behavior: auto;
    }

    .matrix {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .shared-floor-card {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 4px;
      align-items: center;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-2);
      content-visibility: auto;
      contain-intrinsic-size: 42px;
    }

    .floor-cell {
      display: grid;
      gap: 2px;
      justify-items: center;
    }

    .floor-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      padding: 2px 4px;
      border-radius: 999px;
      background: rgba(79, 140, 255, .14);
      border: 1px solid rgba(79, 140, 255, .22);
      font-size: 9px;
      font-weight: 900;
      color: #e8f0ff;
    }

    .floor-count {
      font-size: 7px;
      color: var(--muted);
      text-align: center;
    }

    .shared-pick-cell {
      width: 100%;
      min-width: 0;
      padding: 2px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }

    .shared-pick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 2px;
    }

    .shared-pick-btn {
      position: relative;
      min-height: 20px;
      padding: 1px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.08);
      background: #0d1525;
      color: var(--muted);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 0;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .shared-pick-btn .num {
      font-size: clamp(10px, 1.2vw, 12px);
      font-weight: 900;
      line-height: 1;
    }

    .shared-pick-btn .owner {
      font-size: clamp(6px, .75vw, 7px);
      line-height: 1;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: .95em;
    }

    .shared-pick-btn.claimed {
      color: white;
      border-color: rgba(255,255,255,.16);
      background: linear-gradient(180deg, var(--slot-color, #8b5cf6), var(--slot-color-2, #7c3aed));
      box-shadow: 0 3px 8px rgba(var(--slot-rgb, 139,92,246), .18);
    }

    .shared-pick-btn.mine {
      box-shadow: 0 0 0 1px rgba(255,255,255,.2), 0 3px 8px rgba(var(--slot-rgb, 139,92,246), .18);
    }

    .shared-pick-btn.locked {
      opacity: .9;
    }

    .shared-pick-btn.empty:hover:not(:disabled) {
      background: #13203a;
      color: #dbeafe;
      border-color: rgba(79,140,255,.28);
    }

    .shared-pick-btn.x-marked::before {
      content: "";
      position: absolute;
      top: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(239, 68, 68, .96);
      box-shadow: 0 1px 3px rgba(0,0,0,.22);
      z-index: 2;
    }

    .shared-pick-btn.x-marked::after {
      content: "✕";
      position: absolute;
      top: 0;
      right: 3px;
      font-size: 8px;
      line-height: 1;
      font-weight: 900;
      color: #fff;
      z-index: 3;
      text-shadow: 0 1px 1px rgba(0,0,0,.35);
      pointer-events: none;
    }

    .shared-pick-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .copy-grid,
    .copy-tools-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .copy-card {
      position: static;
      bottom: auto;
      z-index: auto;
      background: var(--panel);
      backdrop-filter: none;
    }

    .copy-btn {
      min-height: 48px;
    }

    .kick-btn {
      min-height: 26px;
      padding: 0 8px;
      border-radius: 9px;
      background: rgba(239,68,68,.14);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,.22);
      font-size: 12px;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(12px);
      background: rgba(5,10,20,.95);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      z-index: 999;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      .inline-chips {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .row-3 {
        grid-template-columns: 1fr 1fr;
      }

      .row-3 > div:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      body { padding: 6px; }
      .app { gap: 8px; }
      .title { font-size: 18px; }
      .header, .compact-head, .board-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .mini-chips { justify-content: flex-start; }
      .hint { white-space: normal; }
      .inline-chips {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .row-3, .row-2, .btn-grid, .players-grid, .copy-grid, .copy-tools-grid {
        grid-template-columns: 1fr 1fr;
      }
      .board-scroll {
        max-height: none;
        overflow: visible;
      }
      .board-toolbar {
        position: static;
        padding-bottom: 0;
        background: none;
        backdrop-filter: none;
      }
      .copy-card {
        position: static;
      }
      .shared-floor-card {
        grid-template-columns: 42px 1fr;
      }
      .shared-pick-btn {
        min-height: 24px;
      }
    }

    @media (max-width: 560px) {
      .inline-chips {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .row-3,
      .row-2,
      .btn-grid,
      .presence-list {
        grid-template-columns: 1fr;
      }

      .shared-floor-card {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 4px;
      }

      .floor-cell {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }

      .shared-pick-grid {
        gap: 2px;
      }

      .shared-pick-btn {
        min-height: 22px;
        padding: 1px;
      }
    }

    @media (max-width: 420px) {
      .player-box {
        padding: 5px 6px;
      }

      .player-title {
        font-size: 9px;
      }

      .player-role {
        font-size: 8px;
        padding: 2px 4px;
      }

      .player-box input[type="text"] {
        padding: 6px 8px;
        font-size: 12px;
      }

      .help-line {
        font-size: 8px;
      }

      .copy-grid,
      .copy-tools-grid {
        gap: 6px;
      }

      .copy-btn,
      .copy-tools-grid .btn {
        min-height: 44px;
        padding: 9px 8px;
        font-size: 13px;
      }
    }

  
    @media (min-width: 721px) {
      .board-scroll {
        max-height: none !important;
        overflow: visible !important;
      }
    }

  </style>
</head>
<body>
  <div class="app">
    <section class="card header">
      <div>
        <h1 class="title">Artale 羅茱平台助手</h1>
        <div class="sub">建立或加入房間後即可開始記錄平台。</div>
      </div>
    </section>

    <section class="card">
      <div class="compact-head">
        <h2 class="section-title" style="margin:0;">房間與玩家</h2>
        <div class="hint">先設定暱稱，再建立或加入房間</div>
      </div>

      <div class="stack">
        <div class="row-3">
          <div>
            <label class="label" for="nicknameInput">我的暱稱</label>
            <input id="nicknameInput" type="text" maxlength="20" placeholder="例如：隊長 / 主教" />
          </div>

          <div>
            <label class="label" for="roomInput">房號</label>
            <input id="roomInput" type="text" maxlength="40" placeholder="例如：RJ-8421" />
          </div>

          <div style="display:flex;align-items:flex-end;">
            <button class="btn secondary" id="copyRoomBtn" style="width:100%;">複製房號</button>
          </div>
        </div>

        <div class="btn-grid">
          <button class="btn" id="createRoomBtn">建立新房</button>
          <button class="btn secondary" id="joinRoomBtn">加入房間</button>
          <button class="btn secondary" id="copyLinkBtn">複製邀請連結</button>
          <button class="btn danger" id="disconnectBtn">離開房間</button>
        </div>

        <div class="inline-chips">
          <span class="status-pill">房間：<strong id="statusRoom">未加入</strong></span>
          <span class="status-pill">角色：<strong id="statusRole">未加入</strong></span>
          <span class="status-pill">連線：<strong id="statusSync">尚未連線</strong></span>
          <span class="status-pill">人數：<strong id="statusPeers">0</strong></span>
          <span class="status-pill">更新：<strong id="lastUpdated">--</strong></span>
        </div>

        <div class="presence-list" id="presenceList">
          <span class="presence-chip">尚未加入房間</span>
        </div>

        <div class="help-line">
          玩家加入後會自動分配唯一顏色；不可手動變更。
        </div>
      </div>
    </section>

    <section class="card">
      <div class="compact-head">
        <h2 class="section-title" style="margin:0;">玩家欄位</h2>
        <div class="hint">名稱可改｜顏色自動分配｜平台選位每層共用</div>
      </div>
      <div class="players-grid" id="playerInputs"></div>
    </section>

    <section class="card board-card">
      <div class="board-toolbar">
        <h2 class="section-title" style="margin:0;">平台記錄</h2>
        <div class="hint">單擊立即選數字｜連點兩下切換 X</div>
      </div>
      <div class="board-scroll">
        <div class="matrix" id="boardBody"></div>
      </div>
    </section>

    <section class="card copy-card">
      <h2 class="section-title">單人複製</h2>
      <div class="copy-grid" id="copyPlayerActions"></div>
      <div class="copy-tools-grid" style="margin-top:8px;">
        <button class="btn warn" id="clearBoardBtn">清空本房答案</button>
        <button class="btn secondary" id="reconnectBtn">重新整理房間狀態</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SLOT_KEYS = ["p1", "p2", "p3", "p4"];
    const FLOORS = Array.from({ length: 10 }, (_, i) => i + 1);
    const DISPLAY_FLOORS = [...FLOORS].reverse();

    const DOUBLE_TAP_MS = 280;
    const RECONNECT_GRACE_MS = 600000; // 10 分鐘
    const AUTO_REJOIN_DELAY_MS = 1200;
    const RESUME_PROBE_TIMEOUT_MS = 4000;
    const GUEST_HEARTBEAT_MS = 15000;
    const MAX_PONG_SILENCE_MS = 45000;

    const COLOR_OPTIONS = {
      purple: { label: "紫色", color: "#8b5cf6", color2: "#7c3aed", rgb: "139,92,246" },
      green:  { label: "綠色", color: "#22c55e", color2: "#16a34a", rgb: "34,197,94" },
      yellow: { label: "黃色", color: "#facc15", color2: "#eab308", rgb: "250,204,21" },
      red:    { label: "紅色", color: "#ef4444", color2: "#dc2626", rgb: "239,68,68" }
    };

    const DEFAULT_SLOT_COLORS = {
      p1: "purple",
      p2: "green",
      p3: "yellow",
      p4: "red"
    };

    const SLOT_META = {
      p1: { label: "玩家1", className: "player-p1" },
      p2: { label: "玩家2", className: "player-p2" },
      p3: { label: "玩家3", className: "player-p3" },
      p4: { label: "玩家4", className: "player-p4" }
    };

    const $ = (id) => document.getElementById(id);

    const dom = {
      nicknameInput: $("nicknameInput"),
      roomInput: $("roomInput"),
      createRoomBtn: $("createRoomBtn"),
      joinRoomBtn: $("joinRoomBtn"),
      copyLinkBtn: $("copyLinkBtn"),
      copyRoomBtn: $("copyRoomBtn"),
      disconnectBtn: $("disconnectBtn"),
      reconnectBtn: $("reconnectBtn"),
      clearBoardBtn: $("clearBoardBtn"),
      statusRoom: $("statusRoom"),
      statusRole: $("statusRole"),
      statusSync: $("statusSync"),
      statusPeers: $("statusPeers"),
      lastUpdated: $("lastUpdated"),
      presenceList: $("presenceList"),
      playerInputs: $("playerInputs"),
      boardBody: $("boardBody"),
      copyPlayerActions: $("copyPlayerActions"),
      toast: $("toast")
    };

    let peer = null;
    let isHost = false;
    let roomId = "";
    let pendingJoinRoom = "";
    let myPeerId = "";
    let mySlot = "";
    let hostConn = null;
    let hostPeerId = "";
    let hostReady = false;

    let joinTimeoutTimer = null;
    let manualLeaving = false;
    let kickedByHost = false;
    let autoRejoinTimer = null;
    let resumeProbeTimer = null;
    let guestHeartbeatTimer = null;
    let allowAutoRejoin = false;
    let reconnectingWithExistingPeer = false;
    let lastPongAt = 0;

    const guestConnections = new Map();
    const graceDisconnectTimers = new Map();

    const clientId = getOrCreateClientId();

    let state = createEmptyState();
    let localXMarks = {};

    const tapActionState = {
      key: "",
      at: 0,
      previousValue: "",
      optimisticApplied: false,
      ignoreClickUntil: 0
    };

    function getOrCreateClientId() {
      const KEY = "rjpq_client_id_v1";
      let id = localStorage.getItem(KEY);
      if (!id) {
        id = (window.crypto && crypto.randomUUID)
          ? crypto.randomUUID()
          : `cid_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        localStorage.setItem(KEY, id);
      }
      return id;
    }

    function createEmptyState() {
      const participants = {};
      SLOT_KEYS.forEach((slot) => participants[slot] = null);
      return {
        participants,
        answers: {},
        updatedAt: 0
      };
    }

    function nowTs() {
      return Date.now();
    }

    function sanitizeRoom(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, "")
        .replace(/[^A-Za-z0-9\-_]/g, "")
        .slice(0, 80);
    }

    function sanitizeNick(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, " ")
        .slice(0, 20);
    }

    function generateRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let result = "RJ-";
      for (let i = 0; i < 6; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
      }
      return result;
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[m]);
    }

    function showToast(message) {
      dom.toast.textContent = message;
      dom.toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => dom.toast.classList.remove("show"), 1800);
    }

    async function copyText(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (_) {}

      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        return true;
      } catch (_) {
        return false;
      }
    }

    function colorName(colorKey) {
      return COLOR_OPTIONS[colorKey]?.label || "紫色";
    }

    function getGraceText() {
      const minutes = RECONNECT_GRACE_MS / 60000;
      if (Number.isInteger(minutes)) return `${minutes} 分鐘`;
      return `${Math.round(RECONNECT_GRACE_MS / 1000)} 秒`;
    }

    function getCurrentNick() {
      return sanitizeNick(dom.nicknameInput.value) || "玩家";
    }

    function getReconnectTargetRoom() {
      return sanitizeRoom(roomId || pendingJoinRoom || hostPeerId || dom.roomInput.value);
    }

    function saveLocalPrefs() {
      localStorage.setItem("rjpq_peerjs_nick", dom.nicknameInput.value.trim());
    }

    function restoreLocalPrefs() {
      const nick = localStorage.getItem("rjpq_peerjs_nick") || "";
      if (nick) dom.nicknameInput.value = nick;
    }

    function getCurrentRoomDisplay() {
      return roomId || pendingJoinRoom || "";
    }

    function getLocalXStorageKey() {
      const keyRoom = sanitizeRoom(getCurrentRoomDisplay() || dom.roomInput.value || "");
      return keyRoom ? `rjpq_xmarks_${keyRoom}` : "";
    }

    function loadLocalXMarks() {
      const storageKey = getLocalXStorageKey();
      if (!storageKey) {
        localXMarks = {};
        return;
      }

      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || "{}");
        localXMarks = parsed && typeof parsed === "object" ? parsed : {};
      } catch (_) {
        localXMarks = {};
      }
    }

    function saveLocalXMarks() {
      const storageKey = getLocalXStorageKey();
      if (!storageKey) return;
      try {
        localStorage.setItem(storageKey, JSON.stringify(localXMarks));
      } catch (_) {}
    }

    function hasLocalXMark(floor, value) {
      return !!localXMarks[`${floor}:${value}`];
    }

    function toggleLocalXMark(floor, value) {
      const key = `${floor}:${value}`;
      if (localXMarks[key]) delete localXMarks[key];
      else localXMarks[key] = 1;
      saveLocalXMarks();
      renderBoard();
    }

    function clearTapActionState() {
      tapActionState.key = "";
      tapActionState.at = 0;
      tapActionState.previousValue = "";
      tapActionState.optimisticApplied = false;
    }

    function getInviteLink() {
      if (!roomId) return "";
      const url = new URL(window.location.href);
      const params = new URLSearchParams();
      params.set("room", roomId);
      url.hash = params.toString();
      return url.toString();
    }

    async function handleCopyLink() {
      if (!roomId) {
        showToast("請先建立或加入房間");
        return;
      }
      const ok = await copyText(getInviteLink());
      showToast(ok ? "已複製邀請連結" : "複製失敗");
    }

    async function handleCopyRoom() {
      const currentRoom = getCurrentRoomDisplay();
      if (!currentRoom) {
        showToast("請先建立或加入房間");
        return;
      }
      const ok = await copyText(currentRoom);
      showToast(ok ? "已複製房號" : "複製失敗");
    }

    function getUsedColorKeys(exceptSlot = "") {
      const used = new Set();
      SLOT_KEYS.forEach((slot) => {
        if (slot === exceptSlot) return;
        const colorKey = state.participants[slot]?.colorKey;
        if (COLOR_OPTIONS[colorKey]) used.add(colorKey);
      });
      return used;
    }

    function uniqueOrder(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function getFirstAvailableColor(exceptSlot = "", preferredOrder = []) {
      const used = getUsedColorKeys(exceptSlot);
      const order = uniqueOrder([...preferredOrder, ...Object.keys(COLOR_OPTIONS)]);
      return order.find((key) => COLOR_OPTIONS[key] && !used.has(key)) || null;
    }

    function normalizeUniqueColors(preferredSlot = "") {
      const taken = new Set();

      if (preferredSlot && state.participants[preferredSlot]) {
        let keepColor = state.participants[preferredSlot].colorKey;
        if (!COLOR_OPTIONS[keepColor] || taken.has(keepColor)) {
          keepColor = getFirstAvailableColor(preferredSlot, [DEFAULT_SLOT_COLORS[preferredSlot]]);
          state.participants[preferredSlot].colorKey =
            keepColor || DEFAULT_SLOT_COLORS[preferredSlot] || "purple";
        }
        taken.add(state.participants[preferredSlot].colorKey);
      }

      SLOT_KEYS.forEach((slot) => {
        if (slot === preferredSlot) return;
        const participant = state.participants[slot];
        if (!participant) return;

        let nextColor = participant.colorKey;
        if (!COLOR_OPTIONS[nextColor] || taken.has(nextColor)) {
          const preferred = uniqueOrder([DEFAULT_SLOT_COLORS[slot], nextColor]);
          nextColor =
            uniqueOrder([...preferred, ...Object.keys(COLOR_OPTIONS)])
              .find((key) => COLOR_OPTIONS[key] && !taken.has(key))
            || DEFAULT_SLOT_COLORS[slot]
            || "purple";

          participant.colorKey = nextColor;
        }

        taken.add(nextColor);
      });
    }

    function getColorKey(slot) {
      return state.participants[slot]?.colorKey || DEFAULT_SLOT_COLORS[slot] || "purple";
    }

    function getTheme(slot) {
      return COLOR_OPTIONS[getColorKey(slot)] || COLOR_OPTIONS.purple;
    }

    function themeStyle(slot) {
      const theme = getTheme(slot);
      return `--slot-color:${theme.color};--slot-color-2:${theme.color2};--slot-rgb:${theme.rgb};`;
    }

    function getSlotName(slot) {
      return state.participants[slot]?.name || SLOT_META[slot].label;
    }

    function getAnswer(floor, slot) {
      return state.answers[`${floor}:${slot}`] || "";
    }

    function getSelectedSlotByValue(floor, value, excludeSlot = "") {
      const target = String(value || "");
      if (!target) return "";
      return SLOT_KEYS.find((slot) => slot !== excludeSlot && getAnswer(floor, slot) === target) || "";
    }

    function getFloorSelections(floor) {
      const result = {};
      SLOT_KEYS.forEach((slot) => {
        const value = getAnswer(floor, slot);
        if (value) result[value] = slot;
      });
      return result;
    }

    function setAnswerLocal(floor, slot, value) {
      const key = `${floor}:${slot}`;
      if (!value) delete state.answers[key];
      else state.answers[key] = String(value);
      state.updatedAt = nowTs();
    }

    function emptyAnswersForSlot(slot) {
      if (!slot) return;
      for (const floor of FLOORS) {
        delete state.answers[`${floor}:${slot}`];
      }
    }

    function buildPlayerReport(slot) {
      const name = getSlotName(slot);
      const digits = FLOORS.map((floor) => String(getAnswer(floor, slot) || 0));
      return `${name}: ${digits.slice(0, 5).join("")}/${digits.slice(5).join("")}`;
    }

    function getConnectedParticipants() {
      return SLOT_KEYS.map((slot) => state.participants[slot]).filter(Boolean);
    }

    function getFreeSlot() {
      return SLOT_KEYS.find((slot) => !state.participants[slot]) || "";
    }

    function findSlotByPeerId(peerId) {
      return SLOT_KEYS.find((slot) => state.participants[slot]?.peerId === peerId) || "";
    }

    function canEditSlot(slot) {
      if (!roomId) return false;
      if (isHost) return true;
      return mySlot === slot;
    }

    function stopGuestHeartbeat() {
      if (guestHeartbeatTimer) {
        clearInterval(guestHeartbeatTimer);
        guestHeartbeatTimer = null;
      }
    }

    function startGuestHeartbeat() {
      stopGuestHeartbeat();
      if (isHost) return;

      guestHeartbeatTimer = setInterval(() => {
        if (manualLeaving || kickedByHost) return;
        if (!roomId) return;
        if (!hostConn || !hostConn.open) return;

        if (document.visibilityState === "visible" && lastPongAt && (Date.now() - lastPongAt > MAX_PONG_SILENCE_MS)) {
          scheduleAutoRejoin("heartbeat-silence");
          return;
        }

        try {
          hostConn.send({
            type: "APP_PING",
            token: `hb_${Date.now()}`
          });
        } catch (_) {}
      }, GUEST_HEARTBEAT_MS);
    }

    function clearJoinTimeout() {
      if (joinTimeoutTimer) {
        clearTimeout(joinTimeoutTimer);
        joinTimeoutTimer = null;
      }
    }

    function clearGraceDisconnect(slot) {
      const timer = graceDisconnectTimers.get(slot);
      if (timer) {
        clearTimeout(timer);
        graceDisconnectTimers.delete(slot);
      }
    }

    function scheduleGraceDisconnect(slot, peerId) {
      clearGraceDisconnect(slot);

      const participant = state.participants[slot];
      if (!participant) return;

      participant.online = false;
      participant.peerId = peerId || participant.peerId;
      participant.reconnectDeadline = Date.now() + RECONNECT_GRACE_MS;
      state.updatedAt = Date.now();

      refreshAll();

      const timer = setTimeout(() => {
        const current = state.participants[slot];
        if (!current) return;
        if (current.online !== false) return;

        emptyAnswersForSlot(slot);
        state.participants[slot] = null;
        graceDisconnectTimers.delete(slot);
        broadcastState();
      }, RECONNECT_GRACE_MS);

      graceDisconnectTimers.set(slot, timer);
      broadcastState();
    }

    function reconnectToHostWithExistingPeer() {
      const targetRoom = getReconnectTargetRoom();
      if (!targetRoom) return false;
      if (!peer || peer.destroyed) return false;
      if (reconnectingWithExistingPeer) return false;
      if (kickedByHost) return false;

      try {
        reconnectingWithExistingPeer = true;

        if (hostConn) {
          try { hostConn.close(); } catch (_) {}
          hostConn = null;
        }

        if (peer.disconnected) {
          try { peer.reconnect(); } catch (_) {}
        }

        if (!peer.open) {
          reconnectingWithExistingPeer = false;
          return false;
        }

        const conn = peer.connect(targetRoom, {
          reliable: true,
          serialization: "json",
          metadata: {
            name: getCurrentNick(),
            clientId
          }
        });

        setupGuestConnection(conn);
        refreshAll();
        reconnectingWithExistingPeer = false;
        return true;
      } catch (_) {
        reconnectingWithExistingPeer = false;
        return false;
      }
    }

    function scheduleAutoRejoin(reason = "") {
      if (isHost || manualLeaving || kickedByHost) return;

      const targetRoom = getReconnectTargetRoom();
      if (!targetRoom) return;

      clearTimeout(autoRejoinTimer);
      pendingJoinRoom = targetRoom;
      dom.roomInput.value = targetRoom;
      setStatusText(dom.statusSync, "連線中斷，重連中", "warn-text");

      autoRejoinTimer = setTimeout(() => {
        autoRejoinTimer = null;
        const reused = reconnectToHostWithExistingPeer();
        if (reused) return;
        startJoin(true);
      }, AUTO_REJOIN_DELAY_MS);
    }

    function probeGuestConnectionOnResume() {
      if (isHost || manualLeaving || kickedByHost) return;

      const targetRoom = getReconnectTargetRoom();
      if (!targetRoom) return;
      if (!allowAutoRejoin && !roomId) return;

      if (!hostConn || !hostConn.open) {
        scheduleAutoRejoin("resume-no-conn");
        return;
      }

      const token = `probe_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      probeGuestConnectionOnResume.lastToken = token;

      clearTimeout(resumeProbeTimer);
      resumeProbeTimer = setTimeout(() => {
        scheduleAutoRejoin("resume-probe-timeout");
      }, RESUME_PROBE_TIMEOUT_MS);

      try {
        hostConn.send({ type: "APP_PING", token });
      } catch (_) {
        scheduleAutoRejoin("resume-probe-send-failed");
      }
    }

    function bindResumeRecovery() {
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          setTimeout(probeGuestConnectionOnResume, 150);
        }
      });

      window.addEventListener("pageshow", () => {
        setTimeout(probeGuestConnectionOnResume, 150);
      });

      window.addEventListener("focus", () => {
        setTimeout(probeGuestConnectionOnResume, 150);
      });

      window.addEventListener("online", () => {
        setTimeout(probeGuestConnectionOnResume, 150);
      });
    }

    function setStatusText(el, text, kind) {
      el.textContent = text;
      el.className = "";
      if (kind) el.classList.add(kind);
    }

    function renderStatus() {
      const displayRoom = getCurrentRoomDisplay();

      dom.statusRoom.textContent = displayRoom || "未加入";
      dom.statusRole.textContent = !displayRoom
        ? "未加入"
        : (isHost ? "房主" : (mySlot ? `成員 (${SLOT_META[mySlot].label})` : "加入中"));

      if (!displayRoom) {
        setStatusText(dom.statusSync, "尚未連線", "");
      } else if (isHost) {
        setStatusText(dom.statusSync, hostReady ? "房主待命中" : "建立中", hostReady ? "online" : "warn-text");
      } else if (roomId && hostConn && hostConn.open) {
        setStatusText(dom.statusSync, "已連上房主", "online");
      } else {
        setStatusText(dom.statusSync, "連線中 / 等待房主", "warn-text");
      }

      dom.statusPeers.textContent = String(getConnectedParticipants().length);

      if (state.updatedAt) {
        dom.lastUpdated.textContent = new Date(state.updatedAt).toLocaleTimeString("zh-TW", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      } else {
        dom.lastUpdated.textContent = "--";
      }

      const inOrJoiningRoom = !!displayRoom;
      dom.createRoomBtn.disabled = inOrJoiningRoom;
      dom.joinRoomBtn.disabled = inOrJoiningRoom;
      dom.copyLinkBtn.disabled = !roomId;
      dom.copyRoomBtn.disabled = !displayRoom;
      dom.disconnectBtn.disabled = !displayRoom;
      dom.clearBoardBtn.disabled = !roomId;
      dom.reconnectBtn.disabled = !displayRoom;
      dom.roomInput.readOnly = inOrJoiningRoom;
    }

    function renderPresence() {
      const list = getConnectedParticipants();

      if (!list.length) {
        dom.presenceList.innerHTML = '<span class="presence-chip">尚未加入房間</span>';
        return;
      }

      dom.presenceList.innerHTML = "";

      list.forEach((participant) => {
        const slot = participant.slot;
        const wrapper = document.createElement("span");
        wrapper.className =
          `presence-chip${participant.isHost ? " host" : ""}${participant.online === false ? " offline" : ""}`;

        const theme = getTheme(slot);
        wrapper.style.borderColor = `rgba(${theme.rgb}, .34)`;
        wrapper.style.background = `rgba(${theme.rgb}, .14)`;
        wrapper.style.color = theme.color;

        const offlineText = participant.online === false ? `｜暫離保留中（${getGraceText()}）` : "";
        wrapper.textContent =
          `${SLOT_META[slot].label}｜${participant.name}${slot === mySlot ? "（我）" : ""}${participant.isHost ? "｜房主" : ""}${offlineText}`;

        if (isHost && !participant.isHost) {
          const btn = document.createElement("button");
          btn.className = "kick-btn";
          btn.textContent = "移除";
          btn.dataset.kickSlot = slot;
          wrapper.appendChild(document.createTextNode(" "));
          wrapper.appendChild(btn);
        }

        dom.presenceList.appendChild(wrapper);
      });
    }

    function renderPlayers() {
      dom.playerInputs.innerHTML = "";

      SLOT_KEYS.forEach((slot) => {
        const meta = SLOT_META[slot];
        const participant = state.participants[slot];
        const box = document.createElement("div");
        box.className = `player-box colorized ${meta.className}`;
        box.style.cssText = themeStyle(slot);

        const isMine = mySlot === slot;
        const canEdit = canEditSlot(slot) && !!participant;

        let headRole = "空位";
        let roleClass = isMine ? "me" : "";

        if (participant) {
          if (participant.isHost) {
            headRole = "房主";
          } else if (participant.online === false) {
            headRole = "暫離中";
            roleClass = "offline";
          } else if (isMine) {
            headRole = "我的欄位";
          } else {
            headRole = "隊友";
          }
        }

        box.innerHTML = `
          <div class="player-head colorized ${meta.className}" style="${themeStyle(slot)}">
            <div class="player-title">${meta.label}</div>
            <div class="player-role ${roleClass}">${headRole}</div>
          </div>

          <label class="label" for="name-${slot}">顯示名稱</label>
          <input
            id="name-${slot}"
            type="text"
            maxlength="20"
            value="${participant ? escapeHtml(participant.name) : ""}"
            placeholder="${meta.label}"
            ${canEdit ? "" : "readonly"}
          />

          <div class="help-line">
            自動配色：${colorName(getColorKey(slot))}
            ${participant ? `｜ID ${String(participant.peerId || "").slice(0, 8)}` : ""}
            ${participant?.online === false ? `｜保留 ${getGraceText()}` : ""}
          </div>
        `;

        dom.playerInputs.appendChild(box);

        const input = box.querySelector(`#name-${slot}`);
        input.addEventListener("change", () => {
          const next = sanitizeNick(input.value) || meta.label;
          input.value = next;
          renameSlot(slot, next);
        });
      });
    }

    function renderCopyActions() {
      dom.copyPlayerActions.innerHTML = "";

      SLOT_KEYS.forEach((slot) => {
        const btn = document.createElement("button");
        btn.className = "btn secondary copy-btn";
        btn.textContent = `複製 ${getSlotName(slot)}`;
        btn.disabled = !state.participants[slot];

        btn.addEventListener("click", async () => {
          const ok = await copyText(buildPlayerReport(slot));
          showToast(ok ? `已複製 ${getSlotName(slot)}` : "複製失敗");
        });

        dom.copyPlayerActions.appendChild(btn);
      });
    }

    function runSinglePickAction(floor, value) {
      const ownerSlot = getSelectedSlotByValue(floor, value);

      if (!roomId || !mySlot) {
        showToast("請先建立或加入房間");
        return;
      }

      if (ownerSlot && ownerSlot !== mySlot) {
        showToast(`${getSlotName(ownerSlot)} 已選 ${value}`);
        return;
      }

      const current = getAnswer(floor, mySlot);
      const nextValue = current === value ? "" : value;
      updateAnswer(mySlot, floor, nextValue);
    }

    function handlePickButtonPress(floor, value) {
      if (!value) return;

      const key = `${floor}:${value}`;
      const now = performance.now();
      const isDoubleTap = tapActionState.key === key && (now - tapActionState.at) <= DOUBLE_TAP_MS;

      if (isDoubleTap) {
        const previousValue = tapActionState.previousValue;
        const shouldRollback = tapActionState.optimisticApplied && mySlot && roomId;

        tapActionState.ignoreClickUntil = now + 380;
        clearTapActionState();

        if (shouldRollback) {
          updateAnswer(mySlot, floor, previousValue || "");
        }

        toggleLocalXMark(floor, value);
        return;
      }

      tapActionState.key = key;
      tapActionState.at = now;
      tapActionState.previousValue = mySlot ? String(getAnswer(floor, mySlot) || "") : "";
      tapActionState.optimisticApplied = false;

      const ownerSlot = getSelectedSlotByValue(floor, value);
      if (!roomId || !mySlot) return;
      if (ownerSlot && ownerSlot !== mySlot) return;

      tapActionState.optimisticApplied = true;
      runSinglePickAction(floor, value);
    }

    function renderBoard() {
      const rows = DISPLAY_FLOORS.map((floor) => {
        const selections = getFloorSelections(floor);
        const count = Object.keys(selections).length;

        const buttons = [1, 2, 3, 4].map((n) => {
          const value = String(n);
          const ownerSlot = selections[value] || "";
          const ownerName = ownerSlot ? getSlotName(ownerSlot) : "";
          const theme = ownerSlot ? getTheme(ownerSlot) : null;

          const classes = ["shared-pick-btn", ownerSlot ? "claimed" : "empty"];
          if (ownerSlot && ownerSlot === mySlot) classes.push("mine");
          if (ownerSlot && ownerSlot !== mySlot) classes.push("locked");
          if (hasLocalXMark(floor, value)) classes.push("x-marked");

          const style = theme
            ? `style="--slot-color:${theme.color};--slot-color-2:${theme.color2};--slot-rgb:${theme.rgb};"`
            : "";

          const disabled = !roomId || !mySlot ? "disabled" : "";

          return `
            <button
              type="button"
              class="${classes.join(" ")}"
              ${style}
              data-floor="${floor}"
              data-value="${value}"
              data-owner-slot="${ownerSlot}"
              ${disabled}
            >
              <span class="num">${value}</span>
              <span class="owner">${escapeHtml(ownerName)}</span>
            </button>
          `;
        }).join("");

        return `
          <div class="shared-floor-card">
            <div class="floor-cell">
              <span class="floor-badge">${floor}F</span>
              <span class="floor-count">${count}/4</span>
            </div>
            <div class="shared-pick-cell">
              <div class="shared-pick-grid">${buttons}</div>
            </div>
          </div>
        `;
      }).join("");

      dom.boardBody.innerHTML = rows;
    }

    function refreshAll() {
      renderStatus();
      renderPresence();
      renderPlayers();
      renderBoard();
      renderCopyActions();
    }

    function broadcastState() {
      if (!isHost) return;

      state.updatedAt = nowTs();

      for (const { conn } of guestConnections.values()) {
        if (conn && conn.open) {
          try {
            conn.send({ type: "STATE_SYNC", state });
          } catch (_) {}
        }
      }

      refreshAll();
    }

    let peerScriptPromise = null;
    let peerLifecycleId = 0;

    function ensurePeerJsLoaded() {
      if (window.Peer) return Promise.resolve();
      if (peerScriptPromise) return peerScriptPromise;

      peerScriptPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js";
        script.async = true;
        script.onload = () => resolve();
        script.onerror = () => {
          peerScriptPromise = null;
          reject(new Error("PEERJS_LOAD_FAILED"));
        };
        document.head.appendChild(script);
      });

      return peerScriptPromise;
    }

    async function createPeer(peerId) {
      await ensurePeerJsLoaded();

      return new Peer(peerId || undefined, {
        host: "0.peerjs.com",
        port: 443,
        secure: true,
        path: "/",
        debug: 1,
        pingInterval: 4000,
        config: {
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" },
            { urls: "stun:stun2.l.google.com:19302" },
            { urls: "stun:stun3.l.google.com:19302" }
          ],
          iceCandidatePoolSize: 10
        }
      });
    }

    function destroyPeer() {
      peerLifecycleId += 1;

      clearTapActionState();
      clearJoinTimeout();

      clearTimeout(autoRejoinTimer);
      autoRejoinTimer = null;

      clearTimeout(resumeProbeTimer);
      resumeProbeTimer = null;

      stopGuestHeartbeat();

      for (const timer of graceDisconnectTimers.values()) {
        clearTimeout(timer);
      }
      graceDisconnectTimers.clear();

      if (hostConn) {
        try { hostConn.close(); } catch (_) {}
        hostConn = null;
      }

      for (const { conn } of guestConnections.values()) {
        try { conn.close(); } catch (_) {}
      }
      guestConnections.clear();

      if (peer) {
        try { peer.destroy(); } catch (_) {}
        peer = null;
      }

      isHost = false;
      hostReady = false;
      roomId = "";
      pendingJoinRoom = "";
      myPeerId = "";
      mySlot = "";
      hostPeerId = "";
      localXMarks = {};
      state = createEmptyState();
      allowAutoRejoin = false;
      manualLeaving = false;
      reconnectingWithExistingPeer = false;
      lastPongAt = 0;
      // kickedByHost 這裡不要清掉，避免後續 close/error 又觸發自動重連

      refreshAll();
    }

    function setupCommonPeerEvents(localPeer) {
      localPeer.on("error", (err) => {
        console.error(err);

        if (kickedByHost) return;

        const transientGuestErrors = ["network", "socket-error", "socket-closed", "server-error"];

        if (!isHost && allowAutoRejoin && transientGuestErrors.includes(err.type)) {
          showToast("網路波動，嘗試重新連線…");
          scheduleAutoRejoin(err.type);
          renderStatus();
          return;
        }

        if (err.type === "unavailable-id") {
          showToast("房號已被使用，請換一個房號");
          const keepRoom = dom.roomInput.value;
          destroyPeer();
          dom.roomInput.value = keepRoom;
        } else if (err.type === "peer-unavailable") {
          showToast("找不到房號，請確認房主仍在線");
          const keepRoom = dom.roomInput.value;
          destroyPeer();
          dom.roomInput.value = keepRoom;
        } else {
          showToast(`連線錯誤：${err.type || "unknown"}`);
        }

        renderStatus();
      });

      localPeer.on("disconnected", () => {
        if (kickedByHost) return;

        setStatusText(dom.statusSync, isHost ? "房主重新掛線中" : "重新連線中", "warn-text");
        try { localPeer.reconnect(); } catch (_) {}
        renderStatus();

        if (!isHost && allowAutoRejoin) {
          scheduleAutoRejoin("peer-disconnected");
        }
      });

      localPeer.on("close", () => {
        renderStatus();
      });
    }

    function setupHostConnection(conn) {
      conn.on("open", () => {
        console.log("guest connected", conn.peer);
      });

      conn.on("data", (msg) => {
        handleHostMessage(conn, msg);
      });

      conn.on("close", () => {
        const info = guestConnections.get(conn.peer);
        const slot = info?.slot || findSlotByPeerId(conn.peer);

        guestConnections.delete(conn.peer);

        if (slot && state.participants[slot]) {
          scheduleGraceDisconnect(slot, conn.peer);
          showToast(`${getSlotName(slot)} 暫時離線，保留座位 ${getGraceText()}`);
        } else {
          refreshAll();
        }
      });

      conn.on("error", (err) => {
        console.error(err);
      });
    }

    function handleHostMessage(conn, msg) {
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "JOIN_REQUEST") {
        const reqClientId = String(msg.clientId || "").slice(0, 80);
        let assignedSlot = "";

        if (reqClientId) {
          assignedSlot = SLOT_KEYS.find(
            (slot) => state.participants[slot]?.clientId === reqClientId
          ) || "";
        }

        if (!assignedSlot) assignedSlot = getFreeSlot();

        if (!assignedSlot) {
          conn.send({ type: "JOIN_REJECT", reason: "房間已滿（上限 4 人）" });
          return;
        }

        const prev = state.participants[assignedSlot];
        clearGraceDisconnect(assignedSlot);

        if (prev?.peerId && prev.peerId !== conn.peer) {
          const oldConn = guestConnections.get(prev.peerId)?.conn;
          guestConnections.delete(prev.peerId);
          try { oldConn && oldConn.close(); } catch (_) {}
        }

        const requestedName = sanitizeNick(msg.name) || prev?.name || SLOT_META[assignedSlot].label;

        state.participants[assignedSlot] = {
          slot: assignedSlot,
          name: requestedName,
          peerId: conn.peer,
          clientId: reqClientId || prev?.clientId || "",
          isHost: false,
          online: true,
          colorKey:
            prev?.colorKey ||
            getFirstAvailableColor("", [DEFAULT_SLOT_COLORS[assignedSlot]]) ||
            DEFAULT_SLOT_COLORS[assignedSlot]
        };

        normalizeUniqueColors(assignedSlot);

        guestConnections.set(conn.peer, {
          conn,
          slot: assignedSlot,
          clientId: reqClientId || ""
        });

        conn.send({
          type: "JOIN_ACCEPT",
          slot: assignedSlot,
          roomId,
          hostPeerId: myPeerId
        });

        broadcastState();
        showToast(`${requestedName} 已加入 ${SLOT_META[assignedSlot].label}`);
        return;
      }

      if (msg.type === "APP_PING") {
        try {
          conn.send({ type: "APP_PONG", token: msg.token || "" });
        } catch (_) {}
        return;
      }

      const senderSlot = guestConnections.get(conn.peer)?.slot || findSlotByPeerId(conn.peer);
      if (!senderSlot) return;

      if (msg.type === "RENAME_ME") {
        const next = sanitizeNick(msg.name) || SLOT_META[senderSlot].label;
        state.participants[senderSlot].name = next;
        broadcastState();
        return;
      }

      if (msg.type === "SET_ANSWER") {
        const floor = Number(msg.floor);
        const value = String(msg.value || "");

        if (!FLOORS.includes(floor)) return;
        if (value && !["1", "2", "3", "4"].includes(value)) return;

        if (value) {
          const occupiedBy = getSelectedSlotByValue(floor, value, senderSlot);
          if (occupiedBy) {
            conn.send({ type: "ACTION_REJECT", reason: `${getSlotName(occupiedBy)} 已選 ${value}` });
            conn.send({ type: "STATE_SYNC", state });
            return;
          }
        }

        setAnswerLocal(floor, senderSlot, value);
        broadcastState();
        return;
      }

      if (msg.type === "CLEAR_BOARD") {
        for (const slot of SLOT_KEYS) emptyAnswersForSlot(slot);
        broadcastState();
        return;
      }

      if (msg.type === "LEAVE_ROOM") {
        emptyAnswersForSlot(senderSlot);
        state.participants[senderSlot] = null;
        guestConnections.delete(conn.peer);
        try { conn.close(); } catch (_) {}
        broadcastState();
      }
    }

    function setupGuestConnection(conn) {
      hostConn = conn;

      conn.on("open", () => {
        setStatusText(dom.statusSync, "已連上房主", "online");

        conn.send({
          type: "JOIN_REQUEST",
          clientId,
          name: getCurrentNick()
        });

        startGuestHeartbeat();
        lastPongAt = Date.now();
      });

      conn.on("data", (msg) => {
        handleGuestMessage(msg);
      });

      conn.on("close", () => {
        hostConn = null;
        clearTimeout(resumeProbeTimer);
        resumeProbeTimer = null;
        stopGuestHeartbeat();

        if (manualLeaving || kickedByHost) return;

        showToast("連線中斷，嘗試重新連線…");
        scheduleAutoRejoin("conn-close");
        refreshAll();
      });

      conn.on("error", (err) => {
        console.error(err);

        if (manualLeaving || kickedByHost) return;

        showToast("連線到房主失敗，準備重連…");
        stopGuestHeartbeat();
        scheduleAutoRejoin("conn-error");
      });
    }

    function handleGuestMessage(msg) {
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "JOIN_ACCEPT") {
        clearJoinTimeout();
        mySlot = msg.slot;
        roomId = msg.roomId || pendingJoinRoom;
        pendingJoinRoom = "";
        hostPeerId = msg.hostPeerId;
        allowAutoRejoin = true;

        clearTimeout(resumeProbeTimer);
        resumeProbeTimer = null;

        loadLocalXMarks();
        window.location.hash = new URLSearchParams({ room: roomId }).toString();
        saveLocalPrefs();
        refreshAll();
        showToast(`已加入房間：${roomId}`);
        return;
      }

      if (msg.type === "JOIN_REJECT") {
        clearJoinTimeout();
        const keepRoom = pendingJoinRoom || dom.roomInput.value;
        showToast(msg.reason || "加入失敗");
        destroyPeer();
        if (keepRoom) dom.roomInput.value = keepRoom;
        restoreFromHash();
        return;
      }

      if (msg.type === "ACTION_REJECT") {
        showToast(msg.reason || "此數字已被其他人選走");
        return;
      }

      if (msg.type === "STATE_SYNC" && msg.state) {
        state = msg.state;
        normalizeUniqueColors();

        const found = findSlotByPeerId(myPeerId);
        if (found) mySlot = found;

        refreshAll();
        return;
      }

      if (msg.type === "APP_PONG") {
        lastPongAt = Date.now();
        if (msg.token && msg.token === probeGuestConnectionOnResume.lastToken) {
          clearTimeout(resumeProbeTimer);
          resumeProbeTimer = null;
        }
        return;
      }

      if (msg.type === "KICK" && msg.slot === mySlot) {
        const keepRoom = roomId || pendingJoinRoom || dom.roomInput.value;

        kickedByHost = true;
        manualLeaving = true;
        allowAutoRejoin = false;
        stopGuestHeartbeat();

        showToast("你已被房主移出房間");

        destroyPeer();

        if (keepRoom) dom.roomInput.value = keepRoom;
        restoreFromHash();
        return;
      }
    }

    function sendToHost(payload) {
      if (isHost) return;

      if (!hostConn || !hostConn.open) {
        showToast("目前未連上房主");
        return;
      }

      try {
        hostConn.send(payload);
      } catch (_) {
        showToast("送出失敗，準備重連…");
        scheduleAutoRejoin("send-failed");
      }
    }

    function renameSlot(slot, name) {
      if (!roomId || !state.participants[slot]) return;
      if (!canEditSlot(slot)) return;

      const next = sanitizeNick(name) || SLOT_META[slot].label;

      if (isHost) {
        state.participants[slot].name = next;
        broadcastState();
      } else if (slot === mySlot) {
        sendToHost({ type: "RENAME_ME", name: next });
      }

      if (slot === mySlot) {
        dom.nicknameInput.value = next;
        saveLocalPrefs();
      }
    }

    function updateAnswer(slot, floor, value) {
      if (!roomId || !mySlot || slot !== mySlot) return;

      if (value) {
        const occupiedBy = getSelectedSlotByValue(floor, value, slot);
        if (occupiedBy) {
          showToast(`${getSlotName(occupiedBy)} 已選 ${value}`);
          return;
        }
      }

      if (isHost) {
        setAnswerLocal(floor, slot, value);
        broadcastState();
      } else {
        sendToHost({ type: "SET_ANSWER", floor, value });
      }
    }

    function clearBoard() {
      if (!roomId) return;

      if (isHost) {
        for (const slot of SLOT_KEYS) emptyAnswersForSlot(slot);
        broadcastState();
      } else {
        sendToHost({ type: "CLEAR_BOARD" });
      }
    }

    function kickSlot(slot) {
      if (!isHost || !state.participants[slot] || slot === "p1") return;

      clearGraceDisconnect(slot);

      const targetPeerId = state.participants[slot].peerId;
      const targetConn = guestConnections.get(targetPeerId)?.conn;

      if (targetConn && targetConn.open) {
        try { targetConn.send({ type: "KICK", slot }); } catch (_) {}
      }

      emptyAnswersForSlot(slot);
      state.participants[slot] = null;
      guestConnections.delete(targetPeerId);

      try { targetConn && targetConn.close(); } catch (_) {}
      broadcastState();
    }

    function validateNick() {
      const nick = sanitizeNick(dom.nicknameInput.value);
      if (!nick) {
        showToast("請先輸入暱稱");
        dom.nicknameInput.focus();
        return "";
      }

      dom.nicknameInput.value = nick;
      saveLocalPrefs();
      return nick;
    }

    async function startHost() {
      if (roomId || pendingJoinRoom) {
        showToast("目前已在房間中");
        return;
      }

      manualLeaving = false;
      kickedByHost = false;
      allowAutoRejoin = false;

      const nick = validateNick();
      if (!nick) return;

      const nextRoom = sanitizeRoom(dom.roomInput.value) || generateRoomCode();

      dom.createRoomBtn.disabled = true;
      dom.joinRoomBtn.disabled = true;
      dom.statusSync.textContent = "建立中";
      dom.roomInput.value = nextRoom;

      destroyPeer();

      const lifecycleId = peerLifecycleId;

      state = createEmptyState();
      isHost = true;
      hostReady = false;
      roomId = nextRoom;
      pendingJoinRoom = "";
      mySlot = "p1";
      loadLocalXMarks();

      try {
        peer = await createPeer(nextRoom);
      } catch (err) {
        console.error(err);
        destroyPeer();
        dom.roomInput.value = nextRoom;
        showToast("PeerJS 載入失敗，請稍後重試");
        refreshAll();
        return;
      }

      if (lifecycleId !== peerLifecycleId) return;

      setupCommonPeerEvents(peer);
      peer.on("connection", (conn) => setupHostConnection(conn));

      peer.on("open", (id) => {
        if (lifecycleId !== peerLifecycleId) return;

        myPeerId = id;
        roomId = id;
        dom.roomInput.value = id;
        loadLocalXMarks();
        saveLocalPrefs();
        hostPeerId = id;
        hostReady = true;

        state.participants.p1 = {
          slot: "p1",
          name: nick,
          peerId: id,
          clientId,
          isHost: true,
          online: true,
          colorKey: getFirstAvailableColor("", [DEFAULT_SLOT_COLORS.p1]) || DEFAULT_SLOT_COLORS.p1
        };

        normalizeUniqueColors("p1");
        state.updatedAt = nowTs();

        window.location.hash = new URLSearchParams({ room: roomId }).toString();
        refreshAll();
        showToast(`房間已建立：${roomId}`);
      });
    }

    async function startJoin(isAuto = false) {
      if ((roomId || pendingJoinRoom) && !isAuto) {
        showToast("目前已在房間中");
        return;
      }

      manualLeaving = false;
      if (!isAuto) kickedByHost = false;

      const nick = isAuto ? getCurrentNick() : validateNick();
      if (!nick) return;

      const targetRoom = sanitizeRoom(dom.roomInput.value || roomId || pendingJoinRoom || hostPeerId);
      if (!targetRoom) {
        showToast("請先輸入房號");
        dom.roomInput.focus();
        return;
      }

      dom.createRoomBtn.disabled = true;
      dom.joinRoomBtn.disabled = true;
      dom.statusSync.textContent = isAuto ? "重連中" : "連線中";
      dom.roomInput.value = targetRoom;
      saveLocalPrefs();

      if (isAuto && peer && !peer.destroyed) {
        pendingJoinRoom = targetRoom;
        hostPeerId = targetRoom;

        const reused = reconnectToHostWithExistingPeer();
        if (reused) return;
      }

      destroyPeer();

      const lifecycleId = peerLifecycleId;

      state = createEmptyState();
      isHost = false;
      roomId = "";
      pendingJoinRoom = targetRoom;
      hostPeerId = targetRoom;
      loadLocalXMarks();

      try {
        peer = await createPeer();
      } catch (err) {
        console.error(err);
        destroyPeer();
        dom.roomInput.value = targetRoom;
        showToast("PeerJS 載入失敗，請稍後重試");
        refreshAll();
        return;
      }

      if (lifecycleId !== peerLifecycleId) return;

      setupCommonPeerEvents(peer);

      peer.on("open", (id) => {
        if (lifecycleId !== peerLifecycleId) return;

        myPeerId = id;

        const conn = peer.connect(targetRoom, {
          reliable: true,
          serialization: "json",
          metadata: { name: nick, clientId }
        });

        setupGuestConnection(conn);
        refreshAll();

        clearJoinTimeout();
        joinTimeoutTimer = setTimeout(() => {
          if (!roomId && pendingJoinRoom) {
            const keepRoom = pendingJoinRoom;
            showToast("加入房間逾時，請確認房主仍在線");
            destroyPeer();
            dom.roomInput.value = keepRoom;
            refreshAll();
          }
        }, 12000);
      });
    }

    function leaveRoom() {
      if (!roomId && !pendingJoinRoom) return;
      if (!confirm("確定要離開房間嗎？")) return;

      manualLeaving = true;
      kickedByHost = false;
      allowAutoRejoin = false;
      stopGuestHeartbeat();

      if (!isHost && hostConn && hostConn.open && mySlot) {
        try { hostConn.send({ type: "LEAVE_ROOM" }); } catch (_) {}
      }

      if (isHost) {
        for (const { conn, slot } of guestConnections.values()) {
          try { conn.send({ type: "KICK", slot }); } catch (_) {}
        }
      }

      destroyPeer();
      window.location.hash = "";
      restoreLocalPrefs();
      showToast("已離開房間");
    }

    function reconnectStateView() {
      if (roomId || pendingJoinRoom) {
        loadLocalXMarks();
      }

      refreshAll();

      if (!isHost && !kickedByHost && (roomId || pendingJoinRoom) && (!hostConn || !hostConn.open)) {
        scheduleAutoRejoin("manual-reconnect-view");
      }

      showToast("已重新整理房間狀態");
    }

    function restoreFromHash() {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash) return;

      const params = new URLSearchParams(hash);
      const room = sanitizeRoom(params.get("room") || hash);
      if (room) dom.roomInput.value = room;
    }

    function attachGlobalKickActions() {
      dom.presenceList.addEventListener("click", (event) => {
        const target = event.target.closest("[data-kick-slot]");
        if (!target) return;

        const slot = target.dataset.kickSlot;
        if (slot && confirm(`確定要移除 ${getSlotName(slot)} 嗎？`)) {
          kickSlot(slot);
        }
      });
    }

    function attachBoardEvents() {
      dom.boardBody.addEventListener("click", (event) => {
        const btn = event.target.closest('.shared-pick-btn[data-floor][data-value]');
        if (!btn) return;

        const now = performance.now();
        if (tapActionState.ignoreClickUntil && now <= tapActionState.ignoreClickUntil) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }

        event.preventDefault();

        const floor = Number(btn.dataset.floor);
        const value = String(btn.dataset.value || "");
        handlePickButtonPress(floor, value);
      });

      dom.boardBody.addEventListener("dblclick", (event) => {
        const btn = event.target.closest('.shared-pick-btn[data-floor][data-value]');
        if (!btn) return;
        event.preventDefault();
        event.stopPropagation();
      });
    }

    dom.createRoomBtn.addEventListener("click", startHost);
    dom.joinRoomBtn.addEventListener("click", () => startJoin(false));
    dom.copyLinkBtn.addEventListener("click", handleCopyLink);
    dom.copyRoomBtn.addEventListener("click", handleCopyRoom);
    dom.disconnectBtn.addEventListener("click", leaveRoom);
    dom.clearBoardBtn.addEventListener("click", clearBoard);
    dom.reconnectBtn.addEventListener("click", reconnectStateView);

    dom.nicknameInput.addEventListener("change", () => {
      const next = sanitizeNick(dom.nicknameInput.value);
      dom.nicknameInput.value = next;
      saveLocalPrefs();

      if (mySlot && next && state.participants[mySlot]) {
        renameSlot(mySlot, next);
      }
    });

    window.addEventListener("beforeunload", () => {
      stopGuestHeartbeat();
      clearTapActionState();

      if (!isHost && hostConn && hostConn.open && mySlot && !kickedByHost) {
        try { hostConn.send({ type: "LEAVE_ROOM" }); } catch (_) {}
      }

      if (peer) {
        try { peer.destroy(); } catch (_) {}
      }
    });

    restoreLocalPrefs();
    restoreFromHash();
    attachGlobalKickActions();
    attachBoardEvents();
    bindResumeRecovery();
    requestAnimationFrame(() => refreshAll());
  </script>
</body>
</html>
