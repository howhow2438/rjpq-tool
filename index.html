
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Artale 羅茱平台助手｜PeerJS 同步版</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #162235;
      --line: rgba(255,255,255,.08);
      --text: #eef4ff;
      --muted: #9fb0c7;
      --primary: #4f8cff;
      --primary-2: #2f6ee8;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --btn: #1c2a40;
      --shadow: 0 14px 30px rgba(0,0,0,.24);
      --p1: #4f8cff;
      --p1-2: #2f6ee8;
      --p1-rgb: 79,140,255;
      --p2: #22c55e;
      --p2-2: #16a34a;
      --p2-rgb: 34,197,94;
      --p3: #f59e0b;
      --p3-2: #ea8500;
      --p3-rgb: 245,158,11;
      --p4: #ef5da8;
      --p4-2: #db2777;
      --p4-rgb: 239,93,168;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #0a1020 0%, #0f172a 100%);
      color: var(--text);
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }

    body { padding: 10px; }
    .app {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }

    .title {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      font-weight: 900;
    }

    .sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .mini-chips, .inline-chips, .presence-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-chips { justify-content: flex-end; }

    .chip, .status-pill, .presence-chip {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid rgba(79, 140, 255, .2);
      background: rgba(79, 140, 255, .12);
      color: #dbeafe;
      white-space: nowrap;
    }

    .presence-chip.host {
      background: rgba(245, 158, 11, .14);
      border-color: rgba(245, 158, 11, .28);
      color: #fde68a;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 900;
    }

    .compact-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stack { display: grid; gap: 8px; }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      background: #0d1525;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 15px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: rgba(79, 140, 255, .55);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, .16);
    }

    input[readonly] {
      opacity: .85;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
    }

    button:active { transform: scale(.98); }
    button:disabled { opacity: .48; cursor: not-allowed; }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .btn {
      min-height: 42px;
      padding: 10px 12px;
      color: white;
      background: linear-gradient(180deg, var(--primary), var(--primary-2));
    }

    .btn.secondary {
      background: var(--btn);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.warn {
      background: linear-gradient(180deg, #f59e0b, #ea8500);
    }

    .btn.danger {
      background: linear-gradient(180deg, #ef4444, #dc2626);
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
    }

    .player-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
    }

    .player-head {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .player-title {
      font-size: 12px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .player-role {
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--muted);
    }

    .player-role.me {
      background: rgba(79,140,255,.18);
      color: #dbeafe;
    }

    .player-box.player-p1,
    .player-head.player-p1,
    .pick-cell.player-p1.has-value { border-color: rgba(var(--p1-rgb), .34); background: rgba(var(--p1-rgb), .12); }
    .player-box.player-p2,
    .player-head.player-p2,
    .pick-cell.player-p2.has-value { border-color: rgba(var(--p2-rgb), .34); background: rgba(var(--p2-rgb), .12); }
    .player-box.player-p3,
    .player-head.player-p3,
    .pick-cell.player-p3.has-value { border-color: rgba(var(--p3-rgb), .34); background: rgba(var(--p3-rgb), .12); }
    .player-box.player-p4,
    .player-head.player-p4,
    .pick-cell.player-p4.has-value { border-color: rgba(var(--p4-rgb), .34); background: rgba(var(--p4-rgb), .12); }

    .player-box.player-p1 input { border-color: rgba(var(--p1-rgb), .28); }
    .player-box.player-p2 input { border-color: rgba(var(--p2-rgb), .28); }
    .player-box.player-p3 input { border-color: rgba(var(--p3-rgb), .28); }
    .player-box.player-p4 input { border-color: rgba(var(--p4-rgb), .28); }

    .help-line {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.45;
    }

    .board-card { padding: 10px; }

    .board-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .board-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
    }

    .matrix { min-width: 620px; }
    .matrix-head, .matrix-row {
      display: grid;
      grid-template-columns: 70px repeat(4, minmax(110px, 1fr));
      align-items: center;
    }

    .matrix-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #10203a;
      border-bottom: 1px solid var(--line);
    }

    .matrix-head > div,
    .matrix-row > div {
      padding: 8px 6px;
      min-width: 0;
    }

    .matrix-head .player-head-col {
      font-size: 12px;
      font-weight: 900;
      text-align: center;
      color: #dbeafe;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .matrix-row { border-bottom: 1px solid rgba(255,255,255,.05); }
    .matrix-row:last-child { border-bottom: 0; }

    .floor-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .floor-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(79, 140, 255, .14);
      border: 1px solid rgba(79, 140, 255, .22);
      font-size: 12px;
      font-weight: 900;
      color: #e8f0ff;
    }

    .pick-cell {
      width: 100%;
      min-width: 0;
      padding: 4px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .pick-cell.has-value {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .pick-cell.player-p1.has-value { box-shadow: inset 0 0 0 1px rgba(var(--p1-rgb), .16); }
    .pick-cell.player-p2.has-value { box-shadow: inset 0 0 0 1px rgba(var(--p2-rgb), .16); }
    .pick-cell.player-p3.has-value { box-shadow: inset 0 0 0 1px rgba(var(--p3-rgb), .16); }
    .pick-cell.player-p4.has-value { box-shadow: inset 0 0 0 1px rgba(var(--p4-rgb), .16); }

    .pick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 4px;
    }

    .pick-btn {
      min-height: 34px;
      padding: 0;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,.08);
      background: #0d1525;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .pick-btn.active { color: white; border-color: rgba(255,255,255,.16); }
    .pick-cell.player-p1 .pick-btn.active { background: linear-gradient(180deg, var(--p1), var(--p1-2)); box-shadow: 0 6px 14px rgba(var(--p1-rgb), .25); }
    .pick-cell.player-p2 .pick-btn.active { background: linear-gradient(180deg, var(--p2), var(--p2-2)); box-shadow: 0 6px 14px rgba(var(--p2-rgb), .25); }
    .pick-cell.player-p3 .pick-btn.active { background: linear-gradient(180deg, var(--p3), var(--p3-2)); box-shadow: 0 6px 14px rgba(var(--p3-rgb), .25); }
    .pick-cell.player-p4 .pick-btn.active { background: linear-gradient(180deg, var(--p4), var(--p4-2)); box-shadow: 0 6px 14px rgba(var(--p4-rgb), .25); }

    .pick-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .kick-btn {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 9px;
      background: rgba(239,68,68,.14);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,.22);
      font-size: 12px;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(12px);
      background: rgba(5,10,20,.95);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      z-index: 999;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 720px) {
      body { padding: 8px; }
      .title { font-size: 20px; }
      .header { align-items: flex-start; flex-direction: column; }
      .mini-chips { justify-content: flex-start; }
      .row-3, .row-2, .btn-grid, .quick-actions {
        grid-template-columns: 1fr 1fr;
      }
      .players-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 520px) {
      .row-3, .row-2, .btn-grid, .quick-actions {
        grid-template-columns: 1fr;
      }
      .players-grid {
        grid-template-columns: 1fr 1fr;
      }
      .matrix {
        min-width: 560px;
      }
      .matrix-head, .matrix-row {
        grid-template-columns: 62px repeat(4, minmax(98px, 1fr));
      }
      .matrix-head > div,
      .matrix-row > div {
        padding: 7px 5px;
      }
      .pick-cell {
        padding: 3px;
      }
      .pick-grid {
        gap: 3px;
      }
      .pick-btn {
        min-height: 30px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card header">
      <div>
        <h1 class="title">Artale 羅茱平台助手</h1>
        <div class="sub">PeerJS 房間同步版｜房主建立房號、其他人加入同房｜直接點 1~4 上色｜玩家固定顏色。</div>
      </div>
      <div class="mini-chips">
        <span class="chip">4 人共用</span>
        <span class="chip">即時同步</span>
        <span class="chip">房主廣播</span>
        <span class="chip">點擊上色</span>
      </div>
    </section>

    <section class="card">
      <div class="compact-head">
        <h2 class="section-title" style="margin:0;">房間與玩家</h2>
        <div class="hint">先設定暱稱，再建立或加入房間</div>
      </div>
      <div class="stack">
        <div class="row-3">
          <div>
            <label class="label" for="nicknameInput">我的暱稱</label>
            <input id="nicknameInput" type="text" maxlength="20" placeholder="例如：隊長 / 主教" />
          </div>
          <div>
            <label class="label" for="roomInput">房號</label>
            <input id="roomInput" type="text" maxlength="40" placeholder="例如：RJ-8421" />
          </div>
          <div style="display:flex;align-items:flex-end;">
            <button class="btn secondary" id="copyRoomBtn" style="width:100%;">複製房號</button>
          </div>
        </div>

        <div class="btn-grid">
          <button class="btn" id="createRoomBtn">建立新房</button>
          <button class="btn secondary" id="joinRoomBtn">加入房間</button>
          <button class="btn secondary" id="copyLinkBtn">複製邀請連結</button>
          <button class="btn danger" id="disconnectBtn">離開房間</button>
        </div>

        <div class="inline-chips">
          <span class="status-pill">房間：<strong id="statusRoom">未加入</strong></span>
          <span class="status-pill">角色：<strong id="statusRole">未加入</strong></span>
          <span class="status-pill">連線：<strong id="statusSync">尚未連線</strong></span>
          <span class="status-pill">人數：<strong id="statusPeers">0</strong></span>
          <span class="status-pill">更新：<strong id="lastUpdated">--</strong></span>
        </div>

        <div class="presence-list" id="presenceList">
          <span class="presence-chip">尚未加入房間</span>
        </div>

        <div class="help-line">
          提醒：這版是 PeerJS 連線。若同房跨裝置仍失敗，通常和網路環境或 P2P 打洞有關，先重試建立／加入一次。
        </div>
      </div>
    </section>

    <section class="card">
      <div class="compact-head">
        <h2 class="section-title" style="margin:0;">玩家欄位</h2>
        <div class="hint">每人固定一欄｜成員僅能改自己的欄位，房主可管理全部</div>
      </div>
      <div class="players-grid" id="playerInputs"></div>
    </section>

    <section class="card board-card">
      <div class="board-toolbar">
        <h2 class="section-title" style="margin:0;">平台記錄</h2>
        <div class="hint">點 1~4 直接填色｜再點一次可清除</div>
      </div>
      <div class="board-scroll">
        <div class="matrix" id="boardBody"></div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">單人複製</h2>
      <div class="quick-actions" id="copyPlayerActions"></div>
      <div class="quick-actions" style="margin-top:8px;">
        <button class="btn warn" id="clearBoardBtn">清空本房答案</button>
        <button class="btn secondary" id="reconnectBtn">重新整理房間狀態</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SLOT_KEYS = ["p1", "p2", "p3", "p4"];
    const FLOORS = Array.from({ length: 10 }, (_, i) => i + 1);
    const DISPLAY_FLOORS = [...FLOORS].reverse();
    const SLOT_META = {
      p1: { label: "玩家1", color: "#4f8cff", className: "player-p1" },
      p2: { label: "玩家2", color: "#22c55e", className: "player-p2" },
      p3: { label: "玩家3", color: "#f59e0b", className: "player-p3" },
      p4: { label: "玩家4", color: "#ef5da8", className: "player-p4" }
    };

    const $ = (id) => document.getElementById(id);

    const dom = {
      nicknameInput: $("nicknameInput"),
      roomInput: $("roomInput"),
      createRoomBtn: $("createRoomBtn"),
      joinRoomBtn: $("joinRoomBtn"),
      copyLinkBtn: $("copyLinkBtn"),
      copyRoomBtn: $("copyRoomBtn"),
      disconnectBtn: $("disconnectBtn"),
      reconnectBtn: $("reconnectBtn"),
      clearBoardBtn: $("clearBoardBtn"),
      statusRoom: $("statusRoom"),
      statusRole: $("statusRole"),
      statusSync: $("statusSync"),
      statusPeers: $("statusPeers"),
      lastUpdated: $("lastUpdated"),
      presenceList: $("presenceList"),
      playerInputs: $("playerInputs"),
      boardBody: $("boardBody"),
      copyPlayerActions: $("copyPlayerActions"),
      toast: $("toast")
    };

    let peer = null;
    let isHost = false;
    let roomId = "";
    let myPeerId = "";
    let mySlot = "";
    let hostConn = null;
    let hostPeerId = "";
    let hostReady = false;
    const guestConnections = new Map();

    let state = createEmptyState();

    function createEmptyState() {
      const participants = {};
      SLOT_KEYS.forEach((slot) => participants[slot] = null);
      return {
        participants,
        answers: {},
        updatedAt: 0
      };
    }

    function nowTs() {
      return Date.now();
    }

    function sanitizeRoom(value) {
      return String(value || "")
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9\-]/g, "")
        .slice(0, 40);
    }

    function sanitizeNick(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, " ")
        .slice(0, 20);
    }

    function generateRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let result = "RJ-";
      for (let i = 0; i < 6; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
      }
      return result;
    }

    function showToast(message) {
      dom.toast.textContent = message;
      dom.toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => dom.toast.classList.remove("show"), 1800);
    }

    async function copyText(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (_) {}
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        return true;
      } catch (_) {
        return false;
      }
    }

    function getInviteLink() {
      if (!roomId) return "";
      const url = new URL(window.location.href);
      const params = new URLSearchParams();
      params.set("room", roomId);
      url.hash = params.toString();
      return url.toString();
    }

    function saveLocalPrefs() {
      localStorage.setItem("rjpq_peerjs_nick", dom.nicknameInput.value.trim());
      localStorage.setItem("rjpq_peerjs_room", dom.roomInput.value.trim());
    }

    function restoreLocalPrefs() {
      const nick = localStorage.getItem("rjpq_peerjs_nick") || "";
      const room = localStorage.getItem("rjpq_peerjs_room") || "";
      if (nick) dom.nicknameInput.value = nick;
      if (room) dom.roomInput.value = room;
    }

    function emptyAnswersForSlot(slot) {
      if (!slot) return;
      for (const floor of FLOORS) {
        delete state.answers[`${floor}:${slot}`];
      }
    }

    function getConnectedParticipants() {
      return SLOT_KEYS.map((slot) => state.participants[slot]).filter(Boolean);
    }

    function getSlotName(slot) {
      return state.participants[slot]?.name || SLOT_META[slot].label;
    }

    function getAnswer(floor, slot) {
      return state.answers[`${floor}:${slot}`] || "";
    }

    function setAnswerLocal(floor, slot, value) {
      const key = `${floor}:${slot}`;
      if (!value) delete state.answers[key];
      else state.answers[key] = String(value);
      state.updatedAt = nowTs();
    }

    function buildPlayerReport(slot) {
      const name = getSlotName(slot);
      const digits = FLOORS.map((floor) => String(getAnswer(floor, slot) || 0));
      return `${name}: ${digits.slice(0, 5).join("")}/${digits.slice(5).join("")}`;
    }

    function canEditSlot(slot) {
      if (!roomId) return false;
      if (isHost) return true;
      return mySlot === slot;
    }

    function setStatusText(el, text, kind) {
      el.textContent = text;
      el.className = "";
      if (kind) el.classList.add(kind);
    }

    function renderStatus() {
      dom.statusRoom.textContent = roomId || "未加入";
      dom.statusRole.textContent = !roomId ? "未加入" : (isHost ? "房主" : (mySlot ? `成員 (${SLOT_META[mySlot].label})` : "成員"));
      if (!roomId) {
        setStatusText(dom.statusSync, "尚未連線", "");
      } else if (isHost) {
        setStatusText(dom.statusSync, hostReady ? "房主待命中" : "建立中", hostReady ? "online" : "warn-text");
      } else if (hostConn && hostConn.open) {
        setStatusText(dom.statusSync, "已連上房主", "online");
      } else {
        setStatusText(dom.statusSync, "等待房主", "warn-text");
      }

      dom.statusPeers.textContent = String(getConnectedParticipants().length);
      if (state.updatedAt) {
        dom.lastUpdated.textContent = new Date(state.updatedAt).toLocaleTimeString("zh-TW", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      } else {
        dom.lastUpdated.textContent = "--";
      }

      dom.createRoomBtn.disabled = !!roomId;
      dom.joinRoomBtn.disabled = !!roomId;
      dom.copyLinkBtn.disabled = !roomId;
      dom.copyRoomBtn.disabled = !roomId;
      dom.disconnectBtn.disabled = !roomId;
      dom.clearBoardBtn.disabled = !roomId;
      dom.reconnectBtn.disabled = !roomId;
      dom.roomInput.readOnly = !!roomId;
    }

    function renderPresence() {
      const list = getConnectedParticipants();
      if (!list.length) {
        dom.presenceList.innerHTML = '<span class="presence-chip">尚未加入房間</span>';
        return;
      }
      dom.presenceList.innerHTML = "";
      list.forEach((participant) => {
        const slot = participant.slot;
        const chip = document.createElement("span");
        chip.className = `presence-chip${participant.isHost ? " host" : ""}`;
        chip.textContent = `${SLOT_META[slot].label}｜${participant.name}${slot === mySlot ? "（我）" : ""}${participant.isHost ? "｜房主" : ""}`;
        dom.presenceList.appendChild(chip);
      });
    }

    function renderPlayers() {
      dom.playerInputs.innerHTML = "";
      SLOT_KEYS.forEach((slot) => {
        const meta = SLOT_META[slot];
        const participant = state.participants[slot];
        const box = document.createElement("div");
        box.className = `player-box ${meta.className}`;

        const isMine = mySlot === slot;
        const canEdit = canEditSlot(slot) && !!participant;
        const headRole = participant
          ? (participant.isHost ? "房主" : (isMine ? "我的欄位" : "隊友"))
          : "空位";

        box.innerHTML = `
          <div class="player-head ${meta.className}">
            <div class="player-title">${meta.label}</div>
            <div class="player-role ${isMine ? "me" : ""}">${headRole}</div>
          </div>
          <label class="label" for="name-${slot}">顯示名稱</label>
          <input id="name-${slot}" type="text" maxlength="20" value="${participant ? escapeHtml(participant.name) : ""}" placeholder="${meta.label}" ${canEdit ? "" : "readonly"} />
          <div class="help-line">固定色：${colorName(meta.color)}${participant ? `｜ID ${participant.peerId.slice(0, 8)}` : ""}</div>
        `;
        dom.playerInputs.appendChild(box);

        const input = box.querySelector(`#name-${slot}`);
        input.addEventListener("change", () => {
          const next = sanitizeNick(input.value) || meta.label;
          input.value = next;
          renameSlot(slot, next);
        });
      });
    }

    function renderCopyActions() {
      dom.copyPlayerActions.innerHTML = "";
      SLOT_KEYS.forEach((slot) => {
        const btn = document.createElement("button");
        btn.className = `btn secondary`;
        btn.textContent = `複製 ${getSlotName(slot)}`;
        btn.disabled = !state.participants[slot];
        btn.addEventListener("click", async () => {
          const ok = await copyText(buildPlayerReport(slot));
          showToast(ok ? `已複製 ${getSlotName(slot)}` : "複製失敗");
        });
        dom.copyPlayerActions.appendChild(btn);
      });
    }

    function renderBoard() {
      const headNames = SLOT_KEYS.map((slot) => getSlotName(slot));
      const head = `
        <div class="matrix-head">
          <div class="floor-cell">樓層</div>
          ${SLOT_KEYS.map((slot, idx) => `<div class="player-head-col ${SLOT_META[slot].className}">${escapeHtml(headNames[idx])}</div>`).join("")}
        </div>
      `;

      const rows = DISPLAY_FLOORS.map((floor) => {
        const cells = SLOT_KEYS.map((slot) => {
          const meta = SLOT_META[slot];
          const value = getAnswer(floor, slot);
          const disabled = !canEditSlot(slot) || !state.participants[slot];
          return `
            <div class="pick-cell ${meta.className} ${value ? "has-value" : ""}">
              <div class="pick-grid">
                ${[1,2,3,4].map((n) => `
                  <button
                    class="pick-btn ${value === String(n) ? "active" : ""}"
                    data-floor="${floor}"
                    data-slot="${slot}"
                    data-value="${n}"
                    ${disabled ? "disabled" : ""}
                  >${n}</button>
                `).join("")}
              </div>
            </div>
          `;
        }).join("");

        return `
          <div class="matrix-row">
            <div class="floor-cell"><span class="floor-badge">${floor}F</span></div>
            ${cells}
          </div>
        `;
      }).join("");

      dom.boardBody.innerHTML = `${head}${rows}`;

      dom.boardBody.querySelectorAll(".pick-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const floor = Number(btn.dataset.floor);
          const slot = btn.dataset.slot;
          const nextValue = btn.dataset.value;
          const current = getAnswer(floor, slot);
          updateAnswer(slot, floor, current === nextValue ? "" : nextValue);
        });
      });
    }

    function colorName(hex) {
      const map = {
        "#4f8cff": "藍",
        "#22c55e": "綠",
        "#f59e0b": "橘",
        "#ef5da8": "粉"
      };
      return map[hex] || hex;
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[m]);
    }

    function refreshAll() {
      renderStatus();
      renderPresence();
      renderPlayers();
      renderBoard();
      renderCopyActions();
    }

    function broadcastState() {
      if (!isHost) return;
      state.updatedAt = nowTs();
      for (const { conn } of guestConnections.values()) {
        if (conn.open) {
          conn.send({ type: "STATE_SYNC", state });
        }
      }
      refreshAll();
    }

    function findSlotByPeerId(peerId) {
      return SLOT_KEYS.find((slot) => state.participants[slot]?.peerId === peerId) || "";
    }

    function getFreeSlot() {
      return SLOT_KEYS.find((slot) => !state.participants[slot]) || "";
    }

    function createPeer(peerId) {
      return new Peer(peerId || undefined, {
        debug: 1,
        config: {
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" }
          ]
        }
      });
    }

    function destroyPeer() {
      if (hostConn) {
        try { hostConn.close(); } catch (_) {}
        hostConn = null;
      }

      for (const { conn } of guestConnections.values()) {
        try { conn.close(); } catch (_) {}
      }
      guestConnections.clear();

      if (peer) {
        try { peer.destroy(); } catch (_) {}
        peer = null;
      }

      isHost = false;
      hostReady = false;
      roomId = "";
      myPeerId = "";
      mySlot = "";
      hostPeerId = "";
      state = createEmptyState();
      refreshAll();
    }

    function setupCommonPeerEvents(localPeer) {
      localPeer.on("error", (err) => {
        console.error(err);
        if (err.type === "unavailable-id") {
          showToast("房號已被使用，請換一個");
          if (isHost && !myPeerId) {
            const keepRoom = dom.roomInput.value;
            destroyPeer();
            dom.roomInput.value = keepRoom;
          }
        } else if (err.type === "peer-unavailable") {
          showToast("找不到房號，請確認是否正確");
          if (!isHost && !myPeerId) {
            const keepRoom = dom.roomInput.value;
            destroyPeer();
            dom.roomInput.value = keepRoom;
          }
        } else {
          showToast(`連線錯誤：${err.type || "unknown"}`);
        }
        renderStatus();
      });

      localPeer.on("disconnected", () => {
        setStatusText(dom.statusSync, "連線中斷", "danger-text");
      });
    }

    function setupHostConnection(conn) {
      conn.on("open", () => {
        console.log("guest connected", conn.peer);
      });

      conn.on("data", (msg) => {
        handleHostMessage(conn, msg);
      });

      conn.on("close", () => {
        const slot = guestConnections.get(conn.peer)?.slot || findSlotByPeerId(conn.peer);
        guestConnections.delete(conn.peer);
        if (slot && state.participants[slot]) {
          emptyAnswersForSlot(slot);
          state.participants[slot] = null;
          broadcastState();
          showToast(`${SLOT_META[slot].label} 已離線`);
        } else {
          refreshAll();
        }
      });

      conn.on("error", (err) => {
        console.error(err);
      });
    }

    function handleHostMessage(conn, msg) {
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "JOIN_REQUEST") {
        const freeSlot = getFreeSlot();
        if (!freeSlot) {
          conn.send({ type: "JOIN_REJECT", reason: "房間已滿（上限 4 人）" });
          return;
        }

        const requestedName = sanitizeNick(msg.name) || SLOT_META[freeSlot].label;
        state.participants[freeSlot] = {
          slot: freeSlot,
          name: requestedName,
          peerId: conn.peer,
          isHost: false
        };
        guestConnections.set(conn.peer, { conn, slot: freeSlot });
        conn.send({
          type: "JOIN_ACCEPT",
          slot: freeSlot,
          roomId,
          hostPeerId: myPeerId
        });
        broadcastState();
        showToast(`${requestedName} 已加入 ${SLOT_META[freeSlot].label}`);
        return;
      }

      const senderSlot = guestConnections.get(conn.peer)?.slot || findSlotByPeerId(conn.peer);
      if (!senderSlot) return;

      if (msg.type === "RENAME_ME") {
        const next = sanitizeNick(msg.name) || SLOT_META[senderSlot].label;
        state.participants[senderSlot].name = next;
        broadcastState();
        return;
      }

      if (msg.type === "SET_ANSWER") {
        const floor = Number(msg.floor);
        const value = String(msg.value || "");
        if (!FLOORS.includes(floor)) return;
        if (value && !["1", "2", "3", "4"].includes(value)) return;
        setAnswerLocal(floor, senderSlot, value);
        broadcastState();
        return;
      }

      if (msg.type === "CLEAR_BOARD") {
        for (const slot of SLOT_KEYS) {
          emptyAnswersForSlot(slot);
        }
        broadcastState();
        return;
      }

      if (msg.type === "LEAVE_ROOM") {
        emptyAnswersForSlot(senderSlot);
        state.participants[senderSlot] = null;
        guestConnections.delete(conn.peer);
        try { conn.close(); } catch (_) {}
        broadcastState();
      }
    }

    function setupGuestConnection(conn) {
      hostConn = conn;

      conn.on("open", () => {
        setStatusText(dom.statusSync, "已連上房主", "online");
        conn.send({
          type: "JOIN_REQUEST",
          name: sanitizeNick(dom.nicknameInput.value) || "玩家"
        });
      });

      conn.on("data", (msg) => {
        handleGuestMessage(msg);
      });

      conn.on("close", () => {
        if (roomId) {
          showToast("房主已離線或房間已關閉");
        }
        destroyPeer();
        restoreFromHash();
      });

      conn.on("error", (err) => {
        console.error(err);
        showToast("連線到房主失敗");
      });
    }

    function handleGuestMessage(msg) {
      if (!msg || typeof msg !== "object") return;

      if (msg.type === "JOIN_ACCEPT") {
        mySlot = msg.slot;
        roomId = msg.roomId;
        hostPeerId = msg.hostPeerId;
        window.location.hash = new URLSearchParams({ room: roomId }).toString();
        saveLocalPrefs();
        refreshAll();
        return;
      }

      if (msg.type === "JOIN_REJECT") {
        showToast(msg.reason || "加入失敗");
        destroyPeer();
        restoreFromHash();
        return;
      }

      if (msg.type === "STATE_SYNC" && msg.state) {
        state = msg.state;
        const found = findSlotByPeerId(myPeerId);
        if (found) mySlot = found;
        refreshAll();
      }

      if (msg.type === "KICK" && msg.slot === mySlot) {
        showToast("你已被房主移出房間");
        destroyPeer();
        restoreFromHash();
      }
    }

    function sendToHost(payload) {
      if (isHost) return;
      if (!hostConn || !hostConn.open) {
        showToast("目前未連上房主");
        return;
      }
      hostConn.send(payload);
    }

    function renameSlot(slot, name) {
      if (!roomId || !state.participants[slot]) return;
      if (!canEditSlot(slot)) return;

      const next = sanitizeNick(name) || SLOT_META[slot].label;
      if (isHost) {
        state.participants[slot].name = next;
        broadcastState();
      } else if (slot === mySlot) {
        sendToHost({ type: "RENAME_ME", name: next });
      }
      if (slot === mySlot) {
        dom.nicknameInput.value = next;
        saveLocalPrefs();
      }
    }

    function updateAnswer(slot, floor, value) {
      if (!roomId || !canEditSlot(slot)) return;
      if (isHost) {
        setAnswerLocal(floor, slot, value);
        broadcastState();
      } else if (slot === mySlot) {
        sendToHost({ type: "SET_ANSWER", floor, value });
      }
    }

    function clearBoard() {
      if (!roomId) return;
      if (isHost) {
        for (const slot of SLOT_KEYS) emptyAnswersForSlot(slot);
        broadcastState();
      } else {
        sendToHost({ type: "CLEAR_BOARD" });
      }
    }

    function kickSlot(slot) {
      if (!isHost || !state.participants[slot] || slot === "p1") return;
      const targetPeerId = state.participants[slot].peerId;
      const targetConn = guestConnections.get(targetPeerId)?.conn;
      if (targetConn && targetConn.open) {
        targetConn.send({ type: "KICK", slot });
      }
      emptyAnswersForSlot(slot);
      state.participants[slot] = null;
      guestConnections.delete(targetPeerId);
      try { targetConn && targetConn.close(); } catch (_) {}
      broadcastState();
    }

    async function handleCopyLink() {
      if (!roomId) {
        showToast("請先建立或加入房間");
        return;
      }
      const ok = await copyText(getInviteLink());
      showToast(ok ? "已複製邀請連結" : "複製失敗");
    }

    async function handleCopyRoom() {
      if (!roomId) {
        showToast("請先建立或加入房間");
        return;
      }
      const ok = await copyText(roomId);
      showToast(ok ? "已複製房號" : "複製失敗");
    }

    function validateNick() {
      const nick = sanitizeNick(dom.nicknameInput.value);
      if (!nick) {
        showToast("請先輸入暱稱");
        dom.nicknameInput.focus();
        return "";
      }
      dom.nicknameInput.value = nick;
      saveLocalPrefs();
      return nick;
    }

    function startHost() {
      if (roomId) {
        showToast("目前已在房間中");
        return;
      }
      const nick = validateNick();
      if (!nick) return;

      const nextRoom = sanitizeRoom(dom.roomInput.value) || generateRoomCode();
      dom.roomInput.value = nextRoom;
      saveLocalPrefs();

      destroyPeer();
      state = createEmptyState();
      isHost = true;
      hostReady = false;
      roomId = nextRoom;
      mySlot = "p1";

      peer = createPeer(nextRoom);
      setupCommonPeerEvents(peer);

      peer.on("open", (id) => {
        myPeerId = id;
        roomId = id;
        hostPeerId = id;
        hostReady = true;
        state.participants.p1 = {
          slot: "p1",
          name: nick,
          peerId: id,
          isHost: true
        };
        state.updatedAt = nowTs();
        peer.on("connection", (conn) => setupHostConnection(conn));
        window.location.hash = new URLSearchParams({ room: roomId }).toString();
        refreshAll();
        showToast(`房間已建立：${roomId}`);
      });
    }

    function startJoin() {
      if (roomId) {
        showToast("目前已在房間中");
        return;
      }
      const nick = validateNick();
      if (!nick) return;

      const targetRoom = sanitizeRoom(dom.roomInput.value);
      if (!targetRoom) {
        showToast("請先輸入房號");
        dom.roomInput.focus();
        return;
      }
      saveLocalPrefs();

      destroyPeer();
      state = createEmptyState();
      isHost = false;
      roomId = targetRoom;
      hostPeerId = targetRoom;

      peer = createPeer();
      setupCommonPeerEvents(peer);

      peer.on("open", (id) => {
        myPeerId = id;
        const conn = peer.connect(targetRoom, { reliable: true, metadata: { name: nick } });
        setupGuestConnection(conn);
        refreshAll();
      });
    }

    function leaveRoom() {
      if (!roomId) return;
      if (!confirm("確定要離開房間嗎？")) return;

      if (!isHost && hostConn && hostConn.open) {
        try { hostConn.send({ type: "LEAVE_ROOM" }); } catch (_) {}
      }

      if (isHost) {
        for (const { conn, slot } of guestConnections.values()) {
          try { conn.send({ type: "KICK", slot }); } catch (_) {}
        }
      }

      destroyPeer();
      window.location.hash = "";
      restoreLocalPrefs();
      showToast("已離開房間");
    }

    function reconnectStateView() {
      refreshAll();
      showToast("已重新整理畫面狀態");
    }

    function restoreFromHash() {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash) return;
      const params = new URLSearchParams(hash);
      const room = sanitizeRoom(params.get("room") || hash);
      if (room) {
        dom.roomInput.value = room;
        saveLocalPrefs();
      }
    }

    function attachGlobalKickActions() {
      dom.presenceList.addEventListener("click", (event) => {
        const target = event.target.closest("[data-kick-slot]");
        if (!target) return;
        const slot = target.dataset.kickSlot;
        if (slot && confirm(`確定要移除 ${getSlotName(slot)} 嗎？`)) {
          kickSlot(slot);
        }
      });
    }

    function renderPresence() {
      const list = getConnectedParticipants();
      if (!list.length) {
        dom.presenceList.innerHTML = '<span class="presence-chip">尚未加入房間</span>';
        return;
      }
      dom.presenceList.innerHTML = "";
      list.forEach((participant) => {
        const slot = participant.slot;
        const wrapper = document.createElement("span");
        wrapper.className = `presence-chip${participant.isHost ? " host" : ""}`;
        wrapper.textContent = `${SLOT_META[slot].label}｜${participant.name}${slot === mySlot ? "（我）" : ""}${participant.isHost ? "｜房主" : ""}`;
        if (isHost && !participant.isHost) {
          const btn = document.createElement("button");
          btn.className = "kick-btn";
          btn.textContent = "移除";
          btn.dataset.kickSlot = slot;
          wrapper.appendChild(document.createTextNode(" "));
          wrapper.appendChild(btn);
        }
        dom.presenceList.appendChild(wrapper);
      });
    }

    dom.createRoomBtn.addEventListener("click", startHost);
    dom.joinRoomBtn.addEventListener("click", startJoin);
    dom.copyLinkBtn.addEventListener("click", handleCopyLink);
    dom.copyRoomBtn.addEventListener("click", handleCopyRoom);
    dom.disconnectBtn.addEventListener("click", leaveRoom);
    dom.clearBoardBtn.addEventListener("click", clearBoard);
    dom.reconnectBtn.addEventListener("click", reconnectStateView);

    dom.nicknameInput.addEventListener("change", () => {
      const next = sanitizeNick(dom.nicknameInput.value);
      dom.nicknameInput.value = next;
      saveLocalPrefs();
      if (mySlot && next && state.participants[mySlot]) {
        renameSlot(mySlot, next);
      }
    });

    window.addEventListener("beforeunload", () => {
      if (!isHost && hostConn && hostConn.open) {
        try { hostConn.send({ type: "LEAVE_ROOM" }); } catch (_) {}
      }
      if (peer) {
        try { peer.destroy(); } catch (_) {}
      }
    });

    restoreLocalPrefs();
    restoreFromHash();
    attachGlobalKickActions();
    refreshAll();
  </script>
</body>
</html>
